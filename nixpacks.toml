# Nixpacks config para Railway
# Garante Python 3.11 + dependências de sistema para librosa/soundfile/torch
# Aumenta timeout do pip pra suportar download grande do torch CPU (~200MB)

[phases.setup]
nixPkgs = [
  "python311",
  "gcc",
  "libffi",
  "openssl",
  "ffmpeg",
  "libsndfile",
]

[phases.install]
cmds = [
  "cd backend && python -m pip install --upgrade pip",
  "cd backend && pip install --no-cache-dir --timeout=600 -r requirements.txt",
]

[phases.build]
cmds = ["echo 'Build complete - skipping any pre-compile.'"]

[start]
cmd = "cd backend && uvicorn server:app --host 0.0.0.0 --port $PORT --workers 1 --timeout-keep-alive 75"

[variables]
PYTHON_VERSION = "3.11"
PIP_NO_CACHE_DIR = "1"
PIP_DISABLE_PIP_VERSION_CHECK = "1"

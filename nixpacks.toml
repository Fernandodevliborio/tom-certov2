# Nixpacks config para Railway
# Garante Python 3.11 + PIP + dependências de sistema para librosa/soundfile/torch

[phases.setup]
nixPkgs = [
  "python311",
  "python311Packages.pip",
  "python311Packages.virtualenv",
  "gcc",
  "libffi",
  "openssl",
  "ffmpeg",
  "libsndfile",
]

[phases.install]
cmds = [
  "cd backend && pip install --no-cache-dir --timeout=600 -r requirements.txt",
]

[start]
cmd = "cd backend && uvicorn server:app --host 0.0.0.0 --port $PORT --workers 1 --timeout-keep-alive 75"

[variables]
PYTHON_VERSION = "3.11"
PIP_NO_CACHE_DIR = "1"
PIP_DISABLE_PIP_VERSION_CHECK = "1"

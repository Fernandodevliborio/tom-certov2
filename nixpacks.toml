# Nixpacks config para Railway garantir Python 3.11
[phases.setup]
nixPkgs = ["python311", "gcc", "libffi", "openssl"]

[phases.install]
cmds = ["cd backend && pip install --upgrade pip && pip install -r requirements.txt"]

[phases.build]
cmds = ["echo 'Build complete'"]

[start]
cmd = "cd backend && uvicorn server:app --host 0.0.0.0 --port $PORT --workers 1"

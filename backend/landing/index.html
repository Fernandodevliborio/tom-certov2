<!-- CSS crítico inline para primeira dobra instantânea -->
<style>
/* Critical CSS - Primeira dobra sem flash branco */
*{margin:0;padding:0;box-sizing:border-box}
html,body,#root{width:100%;min-height:100vh;background:#000}
body{font-family:Inter,-apple-system,BlinkMacSystemFont,sans-serif;color:#fff;overflow-x:hidden}

/* Loading state premium */
.initial-loader{position:fixed;inset:0;z-index:9999;background:#000;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:24px;opacity:1;transition:opacity .3s ease}
.initial-loader.hidden{opacity:0;pointer-events:none}
.initial-loader img{width:120px;height:120px;object-fit:contain;animation:pulse 2s ease-in-out infinite}
.initial-loader p{color:#FFB020;font-size:14px;font-weight:500;letter-spacing:1px}
@keyframes pulse{0%,100%{opacity:.7;transform:scale(1)}50%{opacity:1;transform:scale(1.02)}}

/* Skeleton para conteúdo abaixo da dobra */
.skeleton{background:linear-gradient(90deg,#111 25%,#1a1a1a 50%,#111 75%);background-size:200% 100%;animation:shimmer 1.5s infinite}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
</style>

<!-- Cakto Payment Links Script - Otimizado -->
<script>
document.addEventListener('DOMContentLoaded', function() {
  var paymentLinks = {
    mensal: 'https://pay.cakto.com.br/x6hmjp3_864389',
    trimestral: 'https://pay.cakto.com.br/3mp6tpt',
    semestral: 'https://pay.cakto.com.br/9gcmz9j'
  };
  
  function setPaymentLinks() {
    document.querySelectorAll('a, button').forEach(function(el) {
      var text = (el.textContent || '').toLowerCase().trim();
      var link = null;
      
      if (text.indexOf('mensal') > -1 && text.indexOf('trimestral') === -1 && text.indexOf('semestral') === -1) {
        link = paymentLinks.mensal;
      } else if (text.indexOf('trimestral') > -1) {
        link = paymentLinks.trimestral;
      } else if (text.indexOf('semestral') > -1 || text.indexOf('economizar') > -1) {
        link = paymentLinks.semestral;
      }
      
      if (link) {
        if (el.tagName === 'A') {
          el.href = link;
          el.target = '_blank';
          el.rel = 'noopener';
        } else {
          el.onclick = function() { window.open(link, '_blank', 'noopener'); };
        }
      }
    });
    
    // Remove Emergent badge
    var badge = document.getElementById('emergent-badge');
    if (badge) badge.remove();
    document.querySelectorAll('a[href*="emergent"]').forEach(function(el) { el.remove(); });
  }
  
  // Executar após renderização
  requestAnimationFrame(function() {
    setTimeout(setPaymentLinks, 300);
    setTimeout(setPaymentLinks, 1000);
  });
});
</script>

<!-- Loading inicial premium -->
<div class="initial-loader" id="initial-loader">
  <img src="/tom-certo-logo-256.png" alt="Tom Certo" width="120" height="120"/>
  <p>Carregando...</p>
</div>

<noscript>You need to enable JavaScript to run this app.</noscript>
<div id="root"></div>

<!-- Script principal com defer -->
<script defer src="/static/js/main.946d9fec.js"></script>

<!-- Ocultar loader quando app estiver pronto -->
<script>
(function() {
  var loader = document.getElementById('initial-loader');
  var hideLoader = function() {
    if (loader) {
      loader.classList.add('hidden');
      setTimeout(function() { 
        loader.style.display = 'none'; 
      }, 300);
    }
  };
  
  // Verificar se React renderizou
  var checkReady = function() {
    var root = document.getElementById('root');
    if (root && root.children.length > 0) {
      hideLoader();
    } else {
      requestAnimationFrame(checkReady);
    }
  };
  
  // Iniciar verificação após pequeno delay
  setTimeout(checkReady, 100);
  
  // Fallback: esconder loader após 4s max
  setTimeout(hideLoader, 4000);
})();
</script>

<!-- Preload de imagens abaixo da dobra após carregamento -->
<script>
window.addEventListener('load', function() {
  // Lazy load observer para imagens
  if ('IntersectionObserver' in window) {
    var imgObserver = new IntersectionObserver(function(entries) {
      entries.forEach(function(entry) {
        if (entry.isIntersecting) {
          var img = entry.target;
          if (img.dataset.src) {
            img.src = img.dataset.src;
            img.classList.add('loaded');
          }
          imgObserver.unobserve(img);
        }
      });
    }, { rootMargin: '50px' });
    
    document.querySelectorAll('img[data-src]').forEach(function(img) {
      imgObserver.observe(img);
    });
  }
});
</script>
</body>

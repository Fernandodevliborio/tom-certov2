<!-- Cakto Payment Links Script -->
<script>
document.addEventListener('DOMContentLoaded', function() {
  // Payment links from Cakto
  const paymentLinks = {
    mensal: 'https://pay.cakto.com.br/x6hmjp3_864389',
    trimestral: 'https://pay.cakto.com.br/3mp6tpt',
    semestral: 'https://pay.cakto.com.br/9gcmz9j'
  };
  
  // Function to set payment links on buttons
  function setPaymentLinks() {
    // Get all buttons/links in the page
    const allElements = document.querySelectorAll('a, button');
    
    allElements.forEach(el => {
      const text = el.textContent.toLowerCase().trim();
      
      // Match buttons by their text content
      if (text.includes('quero o mensal') || (text.includes('mensal') && !text.includes('trimestral'))) {
        if (el.tagName === 'A') {
          el.href = paymentLinks.mensal;
          el.target = '_blank';
        } else {
          el.addEventListener('click', () => window.open(paymentLinks.mensal, '_blank'));
        }
      }
      
      if (text.includes('quero o trimestral') || text.includes('trimestral')) {
        if (el.tagName === 'A') {
          el.href = paymentLinks.trimestral;
          el.target = '_blank';
        } else {
          el.addEventListener('click', () => window.open(paymentLinks.trimestral, '_blank'));
        }
      }
      
      if (text.includes('economizar agora') || text.includes('semestral')) {
        if (el.tagName === 'A') {
          el.href = paymentLinks.semestral;
          el.target = '_blank';
        } else {
          el.addEventListener('click', () => window.open(paymentLinks.semestral, '_blank'));
        }
      }
      
      // Hero CTA button
      if (text.includes('quero o tom certo')) {
        if (el.tagName === 'A') {
          el.href = '#pricing';
        }
      }
    });
  }
  
  // Run after React renders (with slight delay)
  setTimeout(setPaymentLinks, 500);
  setTimeout(setPaymentLinks, 1500);
  setTimeout(setPaymentLinks, 3000);
  
  // Remove Emergent badge
  setTimeout(() => {
    const badge = document.getElementById('emergent-badge');
    if (badge) badge.remove();
  }, 100);
  
  // === AJUSTES DO HERO ===
  function adjustHero() {
    // 1. Trocar "louvor" por "ensaio" na subheadline
    const walker = document.createTreeWalker(
      document.body,
      NodeFilter.SHOW_TEXT,
      null,
      false
    );
    
    while (walker.nextNode()) {
      const node = walker.currentNode;
      if (node.nodeValue.includes('travar no louvor')) {
        node.nodeValue = node.nodeValue.replace('travar no louvor', 'travar no ensaio');
      }
    }
    
    // 2. Remover botão "Quero o Tom Certo" do Hero (apenas o primeiro)
    const allLinks = document.querySelectorAll('a, button');
    let heroButtonRemoved = false;
    
    allLinks.forEach(el => {
      if (heroButtonRemoved) return;
      const text = el.textContent.toLowerCase().trim();
      
      // Encontrar o botão "Quero o Tom Certo" no hero (primeiro da página)
      if (text.includes('quero o tom certo') && !text.includes('agora')) {
        // Verificar se está na primeira seção (hero)
        const section = el.closest('section');
        if (section && section === document.querySelector('section:first-of-type')) {
          el.style.display = 'none';
          heroButtonRemoved = true;
        }
      }
    });
  }
  
  // Executar após React renderizar
  setTimeout(adjustHero, 500);
  setTimeout(adjustHero, 1500);
  setTimeout(adjustHero, 3000);
});
</script>

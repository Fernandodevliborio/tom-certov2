<!-- CSS Crítico - Fundo preto instantâneo, sem flash -->
<style>
:root{--tc-bg:#0a0a0a;--tc-gold:#FFB020}
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;min-height:100vh;background:var(--tc-bg);overflow-x:hidden}
body{font-family:Manrope,-apple-system,BlinkMacSystemFont,system-ui,sans-serif;-webkit-font-smoothing:antialiased}
#root{min-height:100vh;background:var(--tc-bg)}

/* Oculta badge Emergent */
#emergent-badge,[id*="emergent"],a[href*="emergent"]{display:none!important;visibility:hidden!important}

/* Scroll suave */
html{scroll-behavior:smooth}

/* IMPORTANTE: NÃO desabilitar animações no mobile */
/* Apenas respeita preferência do usuário por movimento reduzido */
@media(prefers-reduced-motion:reduce){
  .tc-hero-phone,.tc-hero-radial-glow,.tc-ai-ring,.tc-ai-scan-line,.tc-ai-mic-core,.tc-proof-mic-icon{
    animation:none!important
  }
}

<body>

<div id="root"></div>

<!-- Script principal -->
<script defer src="/static/js/main.946d9fec.js"></script>

<!-- Cakto Payment Links -->
<script>
(function(){
  var links={
    m:'https://pay.cakto.com.br/x6hmjp3_864389',
    t:'https://pay.cakto.com.br/3mp6tpt',
    s:'https://pay.cakto.com.br/9gcmz9j'
  };
  
  function setLinks(){
    document.querySelectorAll('a,button').forEach(function(el){
      var txt=(el.textContent||'').toLowerCase();
      var href=null;
      if(txt.indexOf('trimestral')>-1) href=links.t;
      else if(txt.indexOf('semestral')>-1||txt.indexOf('economizar')>-1) href=links.s;
      else if(txt.indexOf('mensal')>-1) href=links.m;
      if(href){
        if(el.tagName==='A'){el.href=href;el.target='_blank';el.rel='noopener noreferrer'}
        else el.onclick=function(e){e.preventDefault();window.open(href,'_blank','noopener')}
      }
    });
    var badge=document.getElementById('emergent-badge');
    if(badge)badge.remove();
    document.querySelectorAll('a[href*="emergent"]').forEach(function(e){e.remove()});
  }
  
  function init(){
    setLinks();
    setTimeout(setLinks,500);
    setTimeout(setLinks,1500);
    setTimeout(setLinks,3000);
  }
  
  if(document.readyState==='loading') document.addEventListener('DOMContentLoaded',init);
  else init();
})();
</script>

<!-- Meta Pixel - carrega após idle -->
<script>
(function(){
  function loadPixel(){
    !function(f,b,e,v,n,t,s){if(f.fbq)return;n=f.fbq=function(){n.callMethod?n.callMethod.apply(n,arguments):n.queue.push(arguments)};if(!f._fbq)f._fbq=n;n.push=n;n.loaded=!0;n.version='2.0';n.queue=[];t=b.createElement(e);t.async=!0;t.src=v;s=b.getElementsByTagName(e)[0];s.parentNode.insertBefore(t,s)}(window,document,'script','https://connect.facebook.net/en_US/fbevents.js');
    fbq('init','1038468498015498');
    fbq('track','PageView');
  }
  if('requestIdleCallback' in window) requestIdleCallback(function(){setTimeout(loadPixel,1000)},{timeout:3000});
  else setTimeout(loadPixel,2500);
})();
</script>
</body>

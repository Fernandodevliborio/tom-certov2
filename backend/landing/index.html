<!-- ═══════════════════════════════════════════════════════════════════════
     CSS CRÍTICO - CARREGA PRIMEIRO PARA EVITAR FOUC
     ═══════════════════════════════════════════════════════════════════════ -->
<style>
/* 1. ANTI-FOUC: Background preto ANTES de qualquer outro CSS */
html,body,#root{background:#0a0a0a!important;background-color:#0a0a0a!important}

/* 2. Sobrescreve Tailwind reset que define body branco */
body{background:#0a0a0a!important;background-color:#0a0a0a!important;margin:0;min-height:100vh}

/* 3. Root também preto */
:root{
  --background:0 0% 4%;
  --tc-bg:#0a0a0a;
  --tc-gold:#FFB020;
}

/* 4. Cores padrão */
*{margin:0;padding:0;box-sizing:border-box}
html{overflow-x:hidden}
body{
  font-family:Manrope,-apple-system,BlinkMacSystemFont,system-ui,sans-serif;
  -webkit-font-smoothing:antialiased;
  -moz-osx-font-smoothing:grayscale;
  color:#fff;
}

/* 5. Oculta badge Emergent */
#emergent-badge,[id*="emergent"],a[href*="emergent"]{display:none!important;visibility:hidden!important}

/* 6. Fontes com font-display: swap para evitar FOUT */
@font-face{font-family:Manrope;font-display:swap;src:local('Manrope')}
@font-face{font-family:Outfit;font-display:swap;src:local('Outfit')}

/* 7. Reserva de espaço para imagens (evita CLS) */
.tc-hero-phone img,
.tc-phone-frame img,
.tc-official-logo-img,
img[alt*="Tom Certo"],
img[alt*="logo"],
img[alt*="mockup"],
img[alt*="celular"] {
  width: 100%;
  height: auto;
  aspect-ratio: attr(width) / attr(height);
}

/* 8. Elementos principais com min-height para evitar CLS */
.tc-hero-premium{min-height:100svh;min-height:100vh}
.tc-ai-detector{min-height:230px}
.tc-phone-frame{min-height:400px}
.tc-app-screen{min-height:100%}

/* 9. Animações com contain para evitar layout shifts */
.tc-hero-phone,
.tc-hero-radial-glow,
.tc-ai-ring,
[class*="animate"] {
  contain: layout style;
  will-change: transform, opacity;
}

/* 10. Scroll suave apenas em desktop e se não houver preferência por movimento reduzido */
@media(min-width:768px) and (prefers-reduced-motion:no-preference){
  html{scroll-behavior:smooth}
}

/* ═══════════════════════════════════════════════════════════════
   BOTÕES CTA PREMIUM - ALTA CONVERSÃO
   ═══════════════════════════════════════════════════════════════ */

/* Estilo base para TODOS os botões de plano */
.tc-cta-btn,
a[href*="cakto"],
button[data-plan],
[class*="pricing"] button,
[class*="pricing"] a,
[class*="plan"] button,
[class*="plan"] a {
  background: linear-gradient(180deg, #FFCA5C 0%, #FFB020 50%, #D4920F 100%) !important;
  color: #000000 !important;
  font-weight: 700 !important;
  font-size: 15px !important;
  letter-spacing: 0.3px !important;
  padding: 16px 32px !important;
  border-radius: 14px !important;
  border: none !important;
  cursor: pointer !important;
  display: inline-flex !important;
  align-items: center !important;
  justify-content: center !important;
  text-decoration: none !important;
  transition: transform 0.15s ease, box-shadow 0.15s ease !important;
  box-shadow: 
    0 1px 0 rgba(255,255,255,0.3) inset,
    0 8px 20px -6px rgba(255,176,32,0.5),
    0 0 0 1px rgba(255,176,32,0.1) !important;
  position: relative !important;
  overflow: hidden !important;
}

/* Hover/Focus nos botões */
.tc-cta-btn:hover,
a[href*="cakto"]:hover,
button[data-plan]:hover {
  transform: scale(1.03) translateY(-2px) !important;
  box-shadow: 
    0 1px 0 rgba(255,255,255,0.4) inset,
    0 12px 28px -6px rgba(255,176,32,0.6),
    0 0 24px -4px rgba(255,176,32,0.4) !important;
}

/* Efeito de clique */
.tc-cta-btn:active,
a[href*="cakto"]:active,
button[data-plan]:active {
  transform: scale(0.98) !important;
  box-shadow: 
    0 1px 0 rgba(255,255,255,0.2) inset,
    0 4px 12px -4px rgba(255,176,32,0.4) !important;
}

/* Card do plano principal (trimestral) - destaque extra */
.tc-plan-featured {
  transform: scale(1.03) !important;
  border: 2px solid var(--tc-gold) !important;
  box-shadow: 
    0 0 40px -10px rgba(255,176,32,0.35),
    0 20px 40px -20px rgba(0,0,0,0.5) !important;
  position: relative !important;
  z-index: 10 !important;
}

/* Badge "MAIS ESCOLHIDO" */
.tc-badge-popular {
  position: absolute !important;
  top: -12px !important;
  left: 50% !important;
  transform: translateX(-50%) !important;
  background: linear-gradient(135deg, #FF6B35 0%, #F7931A 100%) !important;
  color: white !important;
  font-size: 11px !important;
  font-weight: 700 !important;
  padding: 6px 14px !important;
  border-radius: 20px !important;
  letter-spacing: 1px !important;
  white-space: nowrap !important;
  box-shadow: 0 4px 12px rgba(255,107,53,0.4) !important;
  z-index: 20 !important;
}

/* Loading state no botão */
.tc-cta-loading {
  pointer-events: none !important;
  opacity: 0.8 !important;
}

.tc-cta-loading::after {
  content: "" !important;
  position: absolute !important;
  width: 18px !important;
  height: 18px !important;
  border: 2px solid transparent !important;
  border-top-color: #000 !important;
  border-radius: 50% !important;
  animation: tc-spin 0.6s linear infinite !important;
}

@keyframes tc-spin {
  to { transform: rotate(360deg); }
}

/* Respeita preferência por movimento reduzido */
@media(prefers-reduced-motion:reduce){
  *,*::before,*::after{
    animation-duration:0.01ms!important;
    animation-iteration-count:1!important;
    transition-duration:0.01ms!important;
  }
}
</style>

<!-- ═══════════════════════════════════════════════════════════════
     CAKTO PAYMENT LINKS - FUNCIONA IMEDIATAMENTE
     ═══════════════════════════════════════════════════════════════ -->
<script>
(function(){
  // Links de pagamento Cakto
  var LINKS = {
    mensal: 'https://pay.cakto.com.br/x6hmjp3_864389',
    trimestral: 'https://pay.cakto.com.br/3mp6tpt',
    semestral: 'https://pay.cakto.com.br/9gcmz9j'
  };
  
  // Novos textos persuasivos dos botões
  var NEW_TEXTS = {
    mensal: 'Começar agora',
    trimestral: 'Acesso imediato',
    semestral: 'Garantir acesso'
  };
  
  // Detecta qual plano baseado no texto
  function detectPlan(text) {
    text = (text || '').toLowerCase().trim();
    if (text.indexOf('trimestral') > -1 || text.indexOf('3 meses') > -1 || text.indexOf('quero o trimestral') > -1) return 'trimestral';
    if (text.indexOf('semestral') > -1 || text.indexOf('6 meses') > -1 || text.indexOf('economizar') > -1) return 'semestral';
    if (text.indexOf('mensal') > -1 || text.indexOf('1 mês') > -1 || text.indexOf('quero o mensal') > -1) return 'mensal';
    return null;
  }
  
  // Aplica o link e estilo ao elemento
  function setupButton(el, plan) {
    var link = LINKS[plan];
    var newText = NEW_TEXTS[plan];
    
    // Marca o elemento como configurado
    if (el.dataset.caktoConfigured) return;
    el.dataset.caktoConfigured = 'true';
    el.dataset.plan = plan;
    
    // Adiciona classe para estilo
    el.classList.add('tc-cta-btn');
    
    // Configura o clique - ABRE NA MESMA ABA
    el.addEventListener('click', function(e) {
      e.preventDefault();
      e.stopPropagation();
      
      // Efeito de loading breve
      el.classList.add('tc-cta-loading');
      
      // Redireciona após 150ms (feedback visual)
      setTimeout(function() {
        window.location.href = link;
      }, 150);
    });
    
    // Atualiza texto se for um dos textos antigos
    var currentText = (el.textContent || '').toLowerCase().trim();
    if (currentText.indexOf('quero') > -1 || currentText.indexOf('economizar') > -1) {
      el.textContent = newText;
    }
    
    // Se for link <a>, configura href também (para SEO/acessibilidade)
    if (el.tagName === 'A') {
      el.href = link;
      el.removeAttribute('target'); // Abre na mesma aba
    }
    
    // Cursor pointer garantido
    el.style.cursor = 'pointer';
  }
  
  // Encontra e configura todos os botões de plano
  function configureAllButtons() {
    // Busca todos elementos clicáveis
    var elements = document.querySelectorAll('a, button, [role="button"]');
    
    elements.forEach(function(el) {
      // Verifica texto do elemento e elementos pai
      var text = el.textContent || '';
      var parentText = el.closest('[class*="card"], [class*="plan"], [class*="pricing"]');
      if (parentText) {
        text += ' ' + parentText.textContent;
      }
      
      var plan = detectPlan(text);
      if (plan) {
        setupButton(el, plan);
      }
    });
    
    // Remove badge Emergent
    var badge = document.getElementById('emergent-badge');
    if (badge) badge.remove();
    document.querySelectorAll('a[href*="emergent"]').forEach(function(e) { e.remove(); });
    
    // Adiciona badge "MAIS ESCOLHIDO" no plano trimestral
    addPopularBadge();
  }
  
  // Adiciona badge no plano mais popular
  function addPopularBadge() {
    var trimestralBtns = document.querySelectorAll('[data-plan="trimestral"]');
    trimestralBtns.forEach(function(btn) {
      var card = btn.closest('[class*="card"], [class*="plan"], div');
      if (card && !card.querySelector('.tc-badge-popular')) {
        card.style.position = 'relative';
        card.classList.add('tc-plan-featured');
        
        var badge = document.createElement('div');
        badge.className = 'tc-badge-popular';
        badge.textContent = '🔥 MAIS ESCOLHIDO';
        card.insertBefore(badge, card.firstChild);
      }
    });
  }
  
  // Executa imediatamente e depois em intervalos para pegar elementos renderizados pelo React
  function init() {
    configureAllButtons();
    
    // Re-executa para pegar elementos que React renderiza depois
    setTimeout(configureAllButtons, 100);
    setTimeout(configureAllButtons, 300);
    setTimeout(configureAllButtons, 600);
    setTimeout(configureAllButtons, 1000);
    setTimeout(configureAllButtons, 2000);
    setTimeout(configureAllButtons, 4000);
    
    // Observer para mudanças no DOM (React dinâmico)
    if (typeof MutationObserver !== 'undefined') {
      var observer = new MutationObserver(function(mutations) {
        var shouldUpdate = mutations.some(function(m) {
          return m.addedNodes.length > 0;
        });
        if (shouldUpdate) {
          setTimeout(configureAllButtons, 50);
        }
      });
      
      observer.observe(document.body, {
        childList: true,
        subtree: true
      });
    }
  }
  
  // Inicia assim que possível
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', init);
  } else {
    init();
  }
  
  // Backup: também executa no load completo
  window.addEventListener('load', function() {
    setTimeout(configureAllButtons, 100);
    setTimeout(configureAllButtons, 500);
  });
})();
</script>

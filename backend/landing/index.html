<!-- CSS Crítico + Botões CTA Premium + OTIMIZAÇÕES DE PERFORMANCE -->
<style>
:root{--tc-bg:#0a0a0a;--tc-gold:#FFB020;--tc-gold-light:#FFCA5C;--tc-gold-dark:#D4920F}
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;min-height:100vh;background:#0a0a0a!important;overflow-x:hidden}
body{font-family:Manrope,-apple-system,BlinkMacSystemFont,system-ui,sans-serif;-webkit-font-smoothing:antialiased}

/* ═══════════════════════════════════════════════════════════════
   OTIMIZAÇÕES CRÍTICAS DE PERFORMANCE - ANTI-TRAVAMENTO
   ═══════════════════════════════════════════════════════════════ */

/* GPU Acceleration para scroll suave */
html{
  scroll-behavior:smooth;
  -webkit-overflow-scrolling:touch; /* iOS smooth scroll */
}

/* Força GPU em elementos que animam */
*{
  -webkit-backface-visibility:hidden;
  backface-visibility:hidden;
}

/* Content-visibility: pula renderização fora da viewport */
section, [class*="section"], [class*="pricing"], [class*="testimonial"], [class*="faq"] {
  content-visibility: auto;
  contain-intrinsic-size: auto 500px;
}

/* Will-change APENAS quando necessário (não global) */
.tc-cta-btn:hover,
a[href*="cakto"]:hover,
button:hover {
  will-change: transform;
}

/* Remove will-change após animação */
.tc-cta-btn:not(:hover),
a[href*="cakto"]:not(:hover),
button:not(:hover) {
  will-change: auto;
}

/* Lazy loading nativo para imagens */
img {
  content-visibility: auto;
}

/* Oculta badge Emergent */
#emergent-badge,[id*="emergent"],a[href*="emergent"]{display:none!important;visibility:hidden!important}

/* ═══════════════════════════════════════════════════════════════
   BOTÕES CTA PREMIUM - ALTA CONVERSÃO (OTIMIZADOS)
   ═══════════════════════════════════════════════════════════════ */

/* Estilo base para TODOS os botões de plano */
.tc-cta-btn,
a[href*="cakto"],
button[data-plan],
[class*="pricing"] button,
[class*="pricing"] a,
[class*="plan"] button,
[class*="plan"] a {
  background: linear-gradient(180deg, var(--tc-gold-light) 0%, var(--tc-gold) 50%, var(--tc-gold-dark) 100%) !important;
  color: #000000 !important;
  font-weight: 700 !important;
  font-size: 15px !important;
  letter-spacing: 0.3px !important;
  padding: 16px 32px !important;
  border-radius: 14px !important;
  border: none !important;
  cursor: pointer !important;
  display: inline-flex !important;
  align-items: center !important;
  justify-content: center !important;
  text-decoration: none !important;
  /* OTIMIZADO: transition apenas em transform */
  transition: transform 0.15s ease-out !important;
  box-shadow: 
    0 1px 0 rgba(255,255,255,0.3) inset,
    0 8px 20px -6px rgba(255,176,32,0.5),
    0 0 0 1px rgba(255,176,32,0.1) !important;
  position: relative !important;
  overflow: hidden !important;
  /* GPU acceleration */
  transform: translateZ(0);
  -webkit-transform: translateZ(0);
}

/* Hover/Focus nos botões - SIMPLIFICADO */
.tc-cta-btn:hover,
a[href*="cakto"]:hover,
button[data-plan]:hover,
[class*="pricing"] button:hover,
[class*="pricing"] a:hover,
[class*="plan"] button:hover,
[class*="plan"] a:hover {
  transform: scale(1.02) translateZ(0) !important;
}

/* Efeito de clique - SIMPLIFICADO */
.tc-cta-btn:active,
a[href*="cakto"]:active,
button[data-plan]:active,
[class*="pricing"] button:active,
[class*="pricing"] a:active,
[class*="plan"] button:active,
[class*="plan"] a:active {
  transform: scale(0.98) translateZ(0) !important;
}

/* Card do plano principal (trimestral) - destaque extra */
[class*="pricing"] > div:nth-child(2),
[class*="plan"]:nth-child(2),
.tc-plan-featured {
  transform: scale(1.02) translateZ(0) !important;
  border: 2px solid var(--tc-gold) !important;
  box-shadow: 0 0 40px -10px rgba(255,176,32,0.35) !important;
  position: relative !important;
  z-index: 10 !important;
}

/* Badge "MAIS ESCOLHIDO" */
.tc-badge-popular {
  position: absolute !important;
  top: -12px !important;
  left: 50% !important;
  transform: translateX(-50%) !important;
  background: linear-gradient(135deg, #FF6B35 0%, #F7931A 100%) !important;
  color: white !important;
  font-size: 11px !important;
  font-weight: 700 !important;
  padding: 6px 14px !important;
  border-radius: 20px !important;
  letter-spacing: 1px !important;
  white-space: nowrap !important;
  box-shadow: 0 4px 12px rgba(255,107,53,0.4) !important;
}

/* Loading state no botão */
.tc-cta-loading {
  pointer-events: none !important;
  opacity: 0.8 !important;
}

.tc-cta-loading::after {
  content: "" !important;
  position: absolute !important;
  width: 18px !important;
  height: 18px !important;
  border: 2px solid transparent !important;
  border-top-color: #000 !important;
  border-radius: 50% !important;
  animation: tc-spin 0.6s linear infinite !important;
}

@keyframes tc-spin {
  to { transform: rotate(360deg); }
}

/* Respeita preferência por movimento reduzido */
@media(prefers-reduced-motion:reduce){
  .tc-hero-phone,.tc-hero-radial-glow,.tc-ai-ring,.tc-ai-scan-line,.tc-ai-mic-core,.tc-proof-mic-icon{
    animation:none!important
  }
}

<!-- ═══════════════════════════════════════════════════════════════
     CAKTO PAYMENT LINKS - FUNCIONA IMEDIATAMENTE
     ═══════════════════════════════════════════════════════════════ -->
<script>
(function(){
  // Links de pagamento Cakto
  var LINKS = {
    mensal: 'https://pay.cakto.com.br/x6hmjp3_864389',
    trimestral: 'https://pay.cakto.com.br/3mp6tpt',
    semestral: 'https://pay.cakto.com.br/9gcmz9j'
  };
  
  // Novos textos persuasivos dos botões
  var NEW_TEXTS = {
    mensal: 'Começar agora',
    trimestral: 'Acesso imediato',
    semestral: 'Garantir acesso'
  };
  
  // Detecta qual plano baseado no texto
  function detectPlan(text) {
    text = (text || '').toLowerCase().trim();
    if (text.indexOf('trimestral') > -1 || text.indexOf('3 meses') > -1 || text.indexOf('quero o trimestral') > -1) return 'trimestral';
    if (text.indexOf('semestral') > -1 || text.indexOf('6 meses') > -1 || text.indexOf('economizar') > -1) return 'semestral';
    if (text.indexOf('mensal') > -1 || text.indexOf('1 mês') > -1 || text.indexOf('quero o mensal') > -1) return 'mensal';
    return null;
  }
  
  // Aplica o link e estilo ao elemento
  function setupButton(el, plan) {
    var link = LINKS[plan];
    var newText = NEW_TEXTS[plan];
    
    // Marca o elemento como configurado
    if (el.dataset.caktoConfigured) return;
    el.dataset.caktoConfigured = 'true';
    el.dataset.plan = plan;
    
    // Adiciona classe para estilo
    el.classList.add('tc-cta-btn');
    
    // Configura o clique - ABRE NA MESMA ABA
    el.addEventListener('click', function(e) {
      e.preventDefault();
      e.stopPropagation();
      
      // Efeito de loading breve
      el.classList.add('tc-cta-loading');
      
      // Redireciona após 150ms (feedback visual)
      setTimeout(function() {
        window.location.href = link;
      }, 150);
    });
    
    // Atualiza texto se for um dos textos antigos
    var currentText = (el.textContent || '').toLowerCase().trim();
    if (currentText.indexOf('quero') > -1 || currentText.indexOf('economizar') > -1) {
      el.textContent = newText;
    }
    
    // Se for link <a>, configura href também (para SEO/acessibilidade)
    if (el.tagName === 'A') {
      el.href = link;
      el.removeAttribute('target'); // Abre na mesma aba
    }
    
    // Cursor pointer garantido
    el.style.cursor = 'pointer';
  }
  
  // Encontra e configura todos os botões de plano
  function configureAllButtons() {
    // Busca todos elementos clicáveis
    var elements = document.querySelectorAll('a, button, [role="button"]');
    
    elements.forEach(function(el) {
      // Verifica texto do elemento e elementos pai
      var text = el.textContent || '';
      var parentText = el.closest('[class*="card"], [class*="plan"], [class*="pricing"]');
      if (parentText) {
        text += ' ' + parentText.textContent;
      }
      
      var plan = detectPlan(text);
      if (plan) {
        setupButton(el, plan);
      }
    });
    
    // Remove badge Emergent
    var badge = document.getElementById('emergent-badge');
    if (badge) badge.remove();
    document.querySelectorAll('a[href*="emergent"]').forEach(function(e) { e.remove(); });
    
    // Adiciona badge "MAIS ESCOLHIDO" no plano trimestral
    addPopularBadge();
  }
  
  // Adiciona badge no plano mais popular
  function addPopularBadge() {
    var trimestralBtns = document.querySelectorAll('[data-plan="trimestral"]');
    trimestralBtns.forEach(function(btn) {
      var card = btn.closest('[class*="card"], [class*="plan"], div');
      if (card && !card.querySelector('.tc-badge-popular')) {
        card.style.position = 'relative';
        card.classList.add('tc-plan-featured');
        
        var badge = document.createElement('div');
        badge.className = 'tc-badge-popular';
        badge.textContent = '🔥 MAIS ESCOLHIDO';
        card.insertBefore(badge, card.firstChild);
      }
    });
  }
  
  // Executa imediatamente e depois em intervalos para pegar elementos renderizados pelo React
  function init() {
    configureAllButtons();
    
    // Re-executa para pegar elementos que React renderiza depois
    setTimeout(configureAllButtons, 100);
    setTimeout(configureAllButtons, 300);
    setTimeout(configureAllButtons, 600);
    setTimeout(configureAllButtons, 1000);
    setTimeout(configureAllButtons, 2000);
    setTimeout(configureAllButtons, 4000);
    
    // Observer para mudanças no DOM (React dinâmico)
    if (typeof MutationObserver !== 'undefined') {
      var observer = new MutationObserver(function(mutations) {
        var shouldUpdate = mutations.some(function(m) {
          return m.addedNodes.length > 0;
        });
        if (shouldUpdate) {
          setTimeout(configureAllButtons, 50);
        }
      });
      
      observer.observe(document.body, {
        childList: true,
        subtree: true
      });
    }
  }
  
  // Inicia assim que possível
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', init);
  } else {
    init();
  }
  
  // Backup: também executa no load completo
  window.addEventListener('load', function() {
    setTimeout(configureAllButtons, 100);
    setTimeout(configureAllButtons, 500);
  });
})();
</script>

<!-- ═══════════════════════════════════════════════════════════════
     PERFORMANCE OPTIMIZER - ANTI-TRAVAMENTO TOTAL
     ═══════════════════════════════════════════════════════════════ -->
<script>
(function(){
  'use strict';
  
  // 1. PASSIVE EVENT LISTENERS - Melhora responsividade do scroll
  var supportsPassive = false;
  try {
    var opts = Object.defineProperty({}, 'passive', {
      get: function() { supportsPassive = true; return true; }
    });
    window.addEventListener('testPassive', null, opts);
    window.removeEventListener('testPassive', null, opts);
  } catch (e) {}
  
  // Força passive em todos os touch/scroll events
  var originalAddEventListener = EventTarget.prototype.addEventListener;
  EventTarget.prototype.addEventListener = function(type, listener, options) {
    var passiveEvents = ['touchstart', 'touchmove', 'wheel', 'mousewheel', 'scroll'];
    if (passiveEvents.indexOf(type) > -1 && supportsPassive) {
      if (typeof options === 'boolean') {
        options = { capture: options, passive: true };
      } else if (typeof options === 'object' && options.passive === undefined) {
        options = Object.assign({}, options, { passive: true });
      } else if (options === undefined) {
        options = { passive: true };
      }
    }
    return originalAddEventListener.call(this, type, listener, options);
  };
  
  // 2. LAZY LOADING DE IMAGENS COM INTERSECTION OBSERVER
  function lazyLoadImages() {
    var images = document.querySelectorAll('img[data-src], img:not([loading])');
    
    if ('IntersectionObserver' in window) {
      var imageObserver = new IntersectionObserver(function(entries) {
        entries.forEach(function(entry) {
          if (entry.isIntersecting) {
            var img = entry.target;
            if (img.dataset.src) {
              img.src = img.dataset.src;
              img.removeAttribute('data-src');
            }
            img.setAttribute('loading', 'lazy');
            imageObserver.unobserve(img);
          }
        });
      }, { rootMargin: '100px' });
      
      images.forEach(function(img) {
        imageObserver.observe(img);
      });
    }
  }
  
  // 3. DESABILITA ANIMAÇÕES DURANTE SCROLL (evita jank)
  var scrollTimeout;
  var body = document.body;
  
  function onScroll() {
    if (!body.classList.contains('is-scrolling')) {
      body.classList.add('is-scrolling');
    }
    clearTimeout(scrollTimeout);
    scrollTimeout = setTimeout(function() {
      body.classList.remove('is-scrolling');
    }, 150);
  }
  
  window.addEventListener('scroll', onScroll, { passive: true });
  
  // 4. REDUZ QUALIDADE DE ANIMAÇÕES EM DISPOSITIVOS LENTOS
  function detectLowEndDevice() {
    // Detecta dispositivos com pouca memória ou CPU lenta
    var isLowEnd = false;
    
    if (navigator.deviceMemory && navigator.deviceMemory < 4) {
      isLowEnd = true;
    }
    if (navigator.hardwareConcurrency && navigator.hardwareConcurrency < 4) {
      isLowEnd = true;
    }
    // Navegadores in-app geralmente são mais lentos
    var ua = navigator.userAgent.toLowerCase();
    if (ua.indexOf('fban') > -1 || ua.indexOf('fbav') > -1 || 
        ua.indexOf('instagram') > -1 || ua.indexOf('twitter') > -1 ||
        ua.indexOf('tiktok') > -1 || ua.indexOf('snapchat') > -1) {
      isLowEnd = true;
    }
    
    return isLowEnd;
  }
  
  if (detectLowEndDevice()) {
    body.classList.add('low-end-device');
    // Injeta CSS para simplificar animações
    var style = document.createElement('style');
    style.textContent = '.low-end-device *{animation-duration:0.1s!important;transition-duration:0.1s!important}.low-end-device .is-scrolling *{animation:none!important;transition:none!important}';
    document.head.appendChild(style);
  }
  
  // 5. CSS PARA PAUSAR ANIMAÇÕES DURANTE SCROLL
  var scrollStyle = document.createElement('style');
  scrollStyle.textContent = '.is-scrolling *{animation-play-state:paused!important;transition:none!important}';
  document.head.appendChild(scrollStyle);
  
  // Executa lazy load após DOM ready
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', lazyLoadImages);
  } else {
    lazyLoadImages();
  }
  
  // 6. REMOVE CONTEÚDO PRÉ-RENDERIZADO APÓS REACT CARREGAR - TRANSIÇÃO SUAVE
  function removePrerender() {
    var prerender = document.getElementById('prerender');
    if (!prerender || !prerender.parentNode) return;
    
    var root = document.getElementById('root');
    // Verifica se React já renderizou algo além do prerender
    if (root && root.children.length > 1) {
      // Fade out suave antes de remover
      prerender.style.transition = 'opacity 0.15s ease-out';
      prerender.style.opacity = '0';
      setTimeout(function() {
        if (prerender.parentNode) prerender.remove();
      }, 150);
    }
  }
  
  // Monitora quando React renderiza
  var observer = new MutationObserver(function(mutations) {
    // Pequeno delay para garantir que React terminou de renderizar
    setTimeout(removePrerender, 50);
  });
  
  var root = document.getElementById('root');
  if (root) {
    observer.observe(root, { childList: true, subtree: false });
  }
  
  // Fallback com mais tempo
  setTimeout(removePrerender, 4000);
  
})();
</script>

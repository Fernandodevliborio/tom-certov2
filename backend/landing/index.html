<!-- Cakto Payment Links Script -->
<script>
document.addEventListener('DOMContentLoaded', function() {
  const paymentLinks = {
    mensal: 'https://pay.cakto.com.br/x6hmjp3_864389',
    trimestral: 'https://pay.cakto.com.br/3mp6tpt',
    semestral: 'https://pay.cakto.com.br/9gcmz9j'
  };
  
  function setPaymentLinks() {
    const allElements = document.querySelectorAll('a, button');
    
    allElements.forEach(el => {
      const text = el.textContent.toLowerCase().trim();
      
      if (text.includes('quero o mensal') || text.includes('assinar mensal') || (text.includes('mensal') && !text.includes('trimestral') && !text.includes('semestral'))) {
        if (el.tagName === 'A') {
          el.href = paymentLinks.mensal;
          el.target = '_blank';
        } else {
          el.onclick = () => window.open(paymentLinks.mensal, '_blank');
        }
      }
      
      if (text.includes('quero o trimestral') || text.includes('assinar trimestral') || text.includes('trimestral')) {
        if (el.tagName === 'A') {
          el.href = paymentLinks.trimestral;
          el.target = '_blank';
        } else {
          el.onclick = () => window.open(paymentLinks.trimestral, '_blank');
        }
      }
      
      if (text.includes('economizar agora') || text.includes('quero o semestral') || text.includes('assinar semestral') || text.includes('semestral')) {
        if (el.tagName === 'A') {
          el.href = paymentLinks.semestral;
          el.target = '_blank';
        } else {
          el.onclick = () => window.open(paymentLinks.semestral, '_blank');
        }
      }
    });
    
    // Remove Emergent badge
    const badge = document.getElementById('emergent-badge');
    if (badge) badge.remove();
    
    // Remove any element with "Made with Emergent"
    document.querySelectorAll('a[href*="emergent"]').forEach(el => el.remove());
  }
  
  setTimeout(setPaymentLinks, 500);
  setTimeout(setPaymentLinks, 1500);
  setTimeout(setPaymentLinks, 3000);
});
</script>

<!-- Hide Emergent Badge -->
<style>

  visibility: hidden !important;
  opacity: 0 !important;
}

<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
<meta name="theme-color" content="#000000"/>
<meta name="description" content="Tom Certo — Descubra o tom da música em segundos. Pare de travar no ensaio."/>

<!-- DNS Prefetch para recursos externos -->

<link rel="dns-prefetch" href="https://fonts.gstatic.com"/>
<link rel="dns-prefetch" href="https://connect.facebook.net"/>

<!-- Preload do CSS crítico -->

<title>Tom Certo — Achei o tom. A música ainda nem começou.</title>

<!-- CSS Crítico Inline - Primeira dobra instantânea -->
<style>
:root{--tc-bg:#000;--tc-gold:#FFB020;--tc-white:#fff}
*{margin:0;padding:0;box-sizing:border-box}
html,body,#root{width:100%;min-height:100vh;background:var(--tc-bg)}
body{font-family:Manrope,-apple-system,BlinkMacSystemFont,system-ui,sans-serif;color:var(--tc-white);overflow-x:hidden;-webkit-font-smoothing:antialiased}

/* Loader otimizado - aparece instantâneo, some rápido */
#loader{position:fixed;inset:0;z-index:9999;background:var(--tc-bg);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:20px;transition:opacity .2s ease-out,visibility .2s}
#loader.done{opacity:0;visibility:hidden;pointer-events:none}
#loader svg{width:80px;height:80px;animation:breathe 2s ease-in-out infinite}
#loader p{color:var(--tc-gold);font-size:13px;font-weight:500;letter-spacing:1.5px;opacity:.9}
@keyframes breathe{0%,100%{opacity:.7;transform:scale(1)}50%{opacity:1;transform:scale(1.03)}}

/* Hide badge */
#emergent-badge,[id*="emergent"],a[href*="emergent"]{display:none!important}

/* Smooth scroll apenas em desktop */
@media(min-width:768px){html{scroll-behavior:smooth}}
@media(prefers-reduced-motion:reduce){*,::before,::after{animation-duration:.01ms!important;transition-duration:.01ms!important}}
</style>

<!-- Fontes - só os pesos usados, com swap -->
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Outfit:wght@600;700;800;900&display=swap" rel="stylesheet" media="print" onload="this.media='all'"/>
<noscript><link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Outfit:wght@600;700;800;900&display=swap" rel="stylesheet"/></noscript>

<!-- CSS principal -->
<link href="/static/css/main.46588e3b.css" rel="stylesheet"/>
</head>
<body>
<!-- Loader SVG inline (sem request externo) -->
<div id="loader">
  <svg viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
    <circle cx="50" cy="50" r="45" stroke="#FFB020" stroke-width="2" opacity="0.2"/>
    <circle cx="50" cy="50" r="35" stroke="#FFB020" stroke-width="1.5" opacity="0.3"/>
    <circle cx="50" cy="50" r="25" stroke="#FFB020" stroke-width="1" opacity="0.4"/>
    <path d="M50 25 L50 35 M50 65 L50 75 M25 50 L35 50 M65 50 L75 50" stroke="#FFB020" stroke-width="2" stroke-linecap="round"/>
    <circle cx="50" cy="50" r="12" fill="#FFB020" opacity="0.9"/>
    <path d="M47 46 L47 54 M53 46 L53 54 M44 50 L56 50" stroke="#000" stroke-width="1.5" stroke-linecap="round"/>
  </svg>
  <p>TOM CERTO</p>
</div>

<noscript>Habilite JavaScript para usar o Tom Certo.</noscript>
<div id="root"></div>

<!-- Script principal -->
<script defer src="/static/js/main.946d9fec.js"></script>

<!-- Loader controller - remove assim que React renderiza -->
<script>
(function(){
  var l=document.getElementById('loader'),r=document.getElementById('root'),t;
  function hide(){l&&l.classList.add('done');clearTimeout(t)}
  function check(){r&&r.children.length>0?hide():requestAnimationFrame(check)}
  setTimeout(check,50);
  t=setTimeout(hide,2500);
})();
</script>

<!-- Scripts não-críticos: Meta Pixel + Cakto (carregados após idle) -->
<script>
(function(){
  // Aguarda o browser ficar idle ou 3s (o que vier primeiro)
  var loaded=false;
  function loadScripts(){
    if(loaded)return;loaded=true;
    
    // Meta Pixel - delay adicional para não competir com interações
    setTimeout(function(){
      !function(f,b,e,v,n,t,s){if(f.fbq)return;n=f.fbq=function(){n.callMethod?n.callMethod.apply(n,arguments):n.queue.push(arguments)};if(!f._fbq)f._fbq=n;n.push=n;n.loaded=!0;n.version='2.0';n.queue=[];t=b.createElement(e);t.async=!0;t.src=v;s=b.getElementsByTagName(e)[0];s.parentNode.insertBefore(t,s)}(window,document,'script','https://connect.facebook.net/en_US/fbevents.js');
      fbq('init','1038468498015498');fbq('track','PageView');
    },2000);
    
    // Cakto Links - executa uma vez após render estável
    setTimeout(function(){
      var links={m:'https://pay.cakto.com.br/x6hmjp3_864389',t:'https://pay.cakto.com.br/3mp6tpt',s:'https://pay.cakto.com.br/9gcmz9j'};
      document.querySelectorAll('a,button').forEach(function(el){
        var txt=(el.textContent||'').toLowerCase();
        var href=txt.indexOf('trimestral')>-1?links.t:txt.indexOf('semestral')>-1||txt.indexOf('economizar')>-1?links.s:txt.indexOf('mensal')>-1&&txt.indexOf('trimestral')===-1?links.m:null;
        if(href){
          if(el.tagName==='A'){el.href=href;el.target='_blank';el.rel='noopener'}
          else el.onclick=function(){window.open(href,'_blank','noopener')}
        }
      });
      // Remove badge
      var b=document.getElementById('emergent-badge');if(b)b.remove();
      document.querySelectorAll('a[href*="emergent"]').forEach(function(e){e.remove()});
    },500);
  }
  
  // Usa requestIdleCallback se disponível, senão setTimeout
  if('requestIdleCallback' in window){
    requestIdleCallback(loadScripts,{timeout:3000});
  }else{
    setTimeout(loadScripts,3000);
  }
})();
</script>
</body>
</html>

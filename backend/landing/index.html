<!-- Critical CSS - Inline para evitar FOUC -->
<style>
html,body,#root{background:#0a0a0a;min-height:100vh;margin:0;padding:0}
body{font-family:system-ui,-apple-system,sans-serif}
#loading{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;background:#0a0a0a;z-index:9999}
#loading svg{width:48px;height:48px;animation:spin 1s linear infinite}
#loading p{margin-top:16px;color:#9CA3AF;font-size:14px}
@keyframes spin{to{transform:rotate(360deg)}}
#emergent-badge,[id*="emergent"],a[href*="emergent"]{display:none!important}
</style>

<title>Tom Certo — Achei o tom. A música ainda nem começou.</title>

<!-- CSS principal -->
<link href="/static/css/main.46588e3b.css" rel="stylesheet"/>

<!-- Fontes carregadas de forma assíncrona -->
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Outfit:wght@600;700;800;900&display=swap" rel="stylesheet" media="print" onload="this.media='all'"/>
</head>
<body>
<noscript>Habilite JavaScript para usar o Tom Certo.</noscript>

<!-- Loading screen enquanto React carrega -->
<div id="loading">
<svg viewBox="0 0 24 24" fill="none" stroke="#FFB020" stroke-width="2">
<circle cx="12" cy="12" r="10" stroke-opacity="0.2"/>
<path d="M12 2a10 10 0 0 1 10 10" stroke-linecap="round"/>
</svg>
<p>Carregando...</p>
</div>

<div id="root"></div>

<!-- Script principal com defer -->
<script defer src="/static/js/main.946d9fec.js"></script>

<!-- Script mínimo para CTA links e remover loading -->
<script>
(function(){
  // Remove loading quando React renderizar
  var root = document.getElementById('root');
  var loading = document.getElementById('loading');
  
  if (root && loading) {
    var observer = new MutationObserver(function(m) {
      if (root.children.length > 0) {
        loading.style.opacity = '0';
        loading.style.transition = 'opacity 0.2s';
        setTimeout(function() { loading.remove(); }, 200);
        observer.disconnect();
      }
    });
    observer.observe(root, { childList: true });
    
    // Fallback: remove após 5s
    setTimeout(function() {
      if (loading.parentNode) {
        loading.style.opacity = '0';
        setTimeout(function() { loading.remove(); }, 200);
      }
    }, 5000);
  }
  
  // Links de pagamento Cakto
  var LINKS = {
    mensal: 'https://pay.cakto.com.br/x6hmjp3_864389',
    trimestral: 'https://pay.cakto.com.br/3mp6tpt',
    semestral: 'https://pay.cakto.com.br/9gcmz9j'
  };
  
  function detectPlan(text) {
    text = (text || '').toLowerCase();
    if (text.indexOf('trimestral') > -1 || text.indexOf('3 meses') > -1) return 'trimestral';
    if (text.indexOf('semestral') > -1 || text.indexOf('6 meses') > -1) return 'semestral';
    if (text.indexOf('mensal') > -1 || text.indexOf('1 mês') > -1) return 'mensal';
    return null;
  }
  
  function setupButtons() {
    var buttons = document.querySelectorAll('button, a');
    buttons.forEach(function(btn) {
      var text = btn.textContent || btn.innerText || '';
      var parent = btn.closest('[class*="pricing"], [class*="plan"], [class*="Pricing"], [class*="Plan"]');
      var plan = detectPlan(text) || (parent ? detectPlan(parent.textContent) : null);
      
      if (plan && LINKS[plan]) {
        if (btn.tagName === 'A') {
          btn.href = LINKS[plan];
        } else {
          btn.onclick = function() { window.open(LINKS[plan], '_blank'); };
        }
        btn.setAttribute('data-plan', plan);
      }
    });
  }
  
  // Setup após DOM ready
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', function() {
      setTimeout(setupButtons, 1000);
    });
  } else {
    setTimeout(setupButtons, 1000);
  }
  
  // Re-setup quando React atualizar
  setTimeout(setupButtons, 3000);
})();
</script>

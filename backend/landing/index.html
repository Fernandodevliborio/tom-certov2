<!-- Cakto Payment Links Script -->
<script>
document.addEventListener('DOMContentLoaded', function() {
  // Payment links from Cakto
  const paymentLinks = {
    mensal: 'https://pay.cakto.com.br/x6hmjp3_864389',
    trimestral: 'https://pay.cakto.com.br/3mp6tpt',
    semestral: 'https://pay.cakto.com.br/9gcmz9j'
  };
  
  // Function to set payment links on buttons
  function setPaymentLinks() {
    // Get all buttons/links in the page
    const allElements = document.querySelectorAll('a, button');
    
    allElements.forEach(el => {
      const text = el.textContent.toLowerCase().trim();
      
      // Match buttons by their text content
      if (text.includes('quero o mensal') || (text.includes('mensal') && !text.includes('trimestral'))) {
        if (el.tagName === 'A') {
          el.href = paymentLinks.mensal;
          el.target = '_blank';
        } else {
          el.addEventListener('click', () => window.open(paymentLinks.mensal, '_blank'));
        }
      }
      
      if (text.includes('quero o trimestral') || text.includes('trimestral')) {
        if (el.tagName === 'A') {
          el.href = paymentLinks.trimestral;
          el.target = '_blank';
        } else {
          el.addEventListener('click', () => window.open(paymentLinks.trimestral, '_blank'));
        }
      }
      
      if (text.includes('economizar agora') || text.includes('semestral')) {
        if (el.tagName === 'A') {
          el.href = paymentLinks.semestral;
          el.target = '_blank';
        } else {
          el.addEventListener('click', () => window.open(paymentLinks.semestral, '_blank'));
        }
      }
      
      // Hero CTA button
      if (text.includes('quero o tom certo')) {
        if (el.tagName === 'A') {
          el.href = '#pricing';
        }
      }
    });
  }
  
  // Run after React renders (with slight delay)
  setTimeout(setPaymentLinks, 500);
  setTimeout(setPaymentLinks, 1500);
  setTimeout(setPaymentLinks, 3000);
  
  // Remove Emergent badge
  setTimeout(() => {
    const badge = document.getElementById('emergent-badge');
    if (badge) badge.remove();
  }, 100);
});
</script>

<!-- CSS Crítico Inline - Primeira dobra instantânea -->
<style>
:root{--tc-bg:#000;--tc-gold:#FFB020;--tc-white:#fff}
*{margin:0;padding:0;box-sizing:border-box}
html,body,#root{width:100%;min-height:100vh;background:var(--tc-bg)}
body{font-family:Manrope,-apple-system,BlinkMacSystemFont,system-ui,sans-serif;color:var(--tc-white);overflow-x:hidden;-webkit-font-smoothing:antialiased}

/* Loader otimizado - aparece instantâneo, some rápido */
#loader{position:fixed;inset:0;z-index:9999;background:var(--tc-bg);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:20px;transition:opacity .2s ease-out,visibility .2s}
#loader.done{opacity:0;visibility:hidden;pointer-events:none}
#loader svg{width:80px;height:80px;animation:breathe 2s ease-in-out infinite}
#loader p{color:var(--tc-gold);font-size:13px;font-weight:500;letter-spacing:1.5px;opacity:.9}
@keyframes breathe{0%,100%{opacity:.7;transform:scale(1)}50%{opacity:1;transform:scale(1.03)}}

/* Hide badge */
#emergent-badge,[id*="emergent"],a[href*="emergent"]{display:none!important}

/* Smooth scroll apenas em desktop */
@media(min-width:768px){html{scroll-behavior:smooth}}
@media(prefers-reduced-motion:reduce){*,::before,::after{animation-duration:.01ms!important;transition-duration:.01ms!important}}
</style>

<script defer src="/static/js/main.946d9fec.js"></script>

<!-- Loader controller - remove assim que React renderiza -->
<script>
(function(){
  var l=document.getElementById('loader'),r=document.getElementById('root'),t;
  function hide(){l&&l.classList.add('done');clearTimeout(t)}
  function check(){r&&r.children.length>0?hide():requestAnimationFrame(check)}
  setTimeout(check,50);
  t=setTimeout(hide,2500);
})();
</script>

<!-- Cakto Payment Links - executa imediatamente após React renderizar -->
<script>
(function(){
  var links={
    m:'https://pay.cakto.com.br/x6hmjp3_864389',
    t:'https://pay.cakto.com.br/3mp6tpt',
    s:'https://pay.cakto.com.br/9gcmz9j'
  };
  
  function setLinks(){
    document.querySelectorAll('a,button').forEach(function(el){
      var txt=(el.textContent||'').toLowerCase();
      var href=null;
      
      // Prioridade: trimestral > semestral/economizar > mensal
      if(txt.indexOf('trimestral')>-1){
        href=links.t;
      }else if(txt.indexOf('semestral')>-1||txt.indexOf('economizar')>-1){
        href=links.s;
      }else if(txt.indexOf('mensal')>-1){
        href=links.m;
      }
      
      if(href){
        if(el.tagName==='A'){
          el.href=href;
          el.target='_blank';
          el.rel='noopener noreferrer';
        }else{
          el.onclick=function(e){
            e.preventDefault();
            window.open(href,'_blank','noopener');
          };
        }
      }
    });
    
    // Remove badge Emergent
    var badge=document.getElementById('emergent-badge');
    if(badge)badge.remove();
    document.querySelectorAll('a[href*="emergent"]').forEach(function(e){e.remove()});
  }
  
  // Executar múltiplas vezes para garantir que pega todos os elementos
  // (React pode renderizar em fases)
  function init(){
    setLinks();
    setTimeout(setLinks,500);
    setTimeout(setLinks,1500);
    setTimeout(setLinks,3000);
  }
  
  // Executar quando DOM estiver pronto
  if(document.readyState==='loading'){
    document.addEventListener('DOMContentLoaded',init);
  }else{
    init();
  }
})();
</script>

    fbq('init','1038468498015498');

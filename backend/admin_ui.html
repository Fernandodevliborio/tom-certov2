<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Tom Certo — Painel Admin</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700&family=Outfit:wght@700;800&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg: #0A0A0A;
    --surface: #111111;
    --surface2: #181818;
    --surface3: #1E1E1E;
    --border: #222222;
    --border-strong: #333333;
    --amber: #FFB020;
    --amber-muted: rgba(255,176,32,0.12);
    --amber-border: rgba(255,176,32,0.30);
    --white: #FFFFFF;
    --text2: #A0A0A0;
    --text3: #555555;
    --green: #22C55E;
    --green-muted: rgba(34,197,94,0.12);
    --green-border: rgba(34,197,94,0.30);
    --red: #EF4444;
    --red-muted: rgba(239,68,68,0.12);
    --red-border: rgba(239,68,68,0.30);
    --blue: #60A5FA;
    --blue-muted: rgba(96,165,250,0.12);
    --blue-border: rgba(96,165,250,0.30);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { background: var(--bg); color: var(--white); font-family: 'Manrope', sans-serif; min-height: 100%; }
  body { padding: 20px; }
  button, input { font-family: inherit; }
  input, select {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--white);
    padding: 12px 14px;
    border-radius: 10px;
    font-size: 14px;
    width: 100%;
    outline: none;
    transition: border-color 0.2s;
  }
  input:focus, select:focus { border-color: var(--amber); }
  label { display: block; font-size: 10px; font-weight: 600; color: var(--amber); letter-spacing: 2.5px; margin-bottom: 6px; text-transform: uppercase; }

  .btn {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 10px 16px; border-radius: 10px; border: 1px solid;
    background: transparent; color: var(--white); font-size: 13px;
    font-weight: 600; cursor: pointer; transition: all 0.15s;
  }
  .btn:hover { transform: translateY(-1px); }
  .btn-primary { background: var(--amber); color: var(--bg); border-color: var(--amber); }
  .btn-danger { background: var(--red-muted); color: var(--red); border-color: var(--red-border); }
  .btn-success { background: var(--green-muted); color: var(--green); border-color: var(--green-border); }
  .btn-amber { background: var(--amber-muted); color: var(--amber); border-color: var(--amber-border); }
  .btn-blue { background: var(--blue-muted); color: var(--blue); border-color: var(--blue-border); }
  .btn-ghost { background: var(--surface2); color: var(--text2); border-color: var(--border); }

  /* LOGIN */
  #login {
    max-width: 440px; margin: 80px auto; background: var(--surface);
    padding: 36px 28px; border-radius: 20px; border: 1px solid var(--border);
    text-align: center;
  }
  #login .logo-wrap {
    width: 120px; height: 120px;
    margin: 0 auto 16px;
    display: flex; align-items: center; justify-content: center;
    filter: drop-shadow(0 0 24px rgba(255,176,32,0.4));
  }
  #login .logo-wrap img {
    width: 100%; height: 100%; object-fit: contain;
  }
  #login h1 { font-family: 'Outfit', sans-serif; font-size: 26px; font-weight: 800; letter-spacing: -0.8px; margin-bottom: 6px; }
  #login .sub { font-size: 11px; color: var(--text3); letter-spacing: 3px; margin-bottom: 32px; }
  #login .row { margin-bottom: 18px; text-align: left; }
  #login .error { color: var(--red); font-size: 12px; margin-bottom: 12px; display: none; }
  #login .error.show { display: block; }
  #login .btn-primary { width: 100%; justify-content: center; padding: 14px; font-size: 15px; }

  /* DASHBOARD */
  #dash { display: none; max-width: 1200px; margin: 0 auto; }
  .header {
    display: flex; justify-content: space-between; align-items: center;
    padding: 16px 4px; border-bottom: 1px solid var(--border); margin-bottom: 24px;
  }
  .header h1 { font-family: 'Outfit', sans-serif; font-size: 20px; font-weight: 700; letter-spacing: -0.4px; display: flex; gap: 10px; align-items: center; }
  .header h1 .hlogo { width: 28px; height: 28px; object-fit: contain; }
  .backend-info { font-size: 11px; color: var(--text3); margin-top: 6px; }

  .stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 20px; }
  .stat {
    background: var(--surface); border: 1px solid var(--border); border-radius: 14px;
    padding: 16px; text-align: center;
  }
  .stat .val { font-family: 'Outfit', sans-serif; font-size: 32px; font-weight: 800; letter-spacing: -1px; }
  .stat .label { font-size: 10px; color: var(--text3); letter-spacing: 2px; margin-top: 4px; }
  .stat.total .val { color: var(--amber); }
  .stat.active .val { color: var(--green); }
  .stat.revoked .val { color: var(--red); }

  .toolbar { display: flex; gap: 12px; align-items: center; margin-bottom: 20px; flex-wrap: wrap; }
  .toolbar .search { flex: 1; min-width: 200px; }
  .toolbar .btn { height: 44px; }

  .tokens-list { display: flex; flex-direction: column; gap: 12px; }
  .token-card {
    background: var(--surface); border: 1px solid var(--border); border-radius: 14px;
    padding: 16px; transition: border-color 0.15s;
  }
  .token-card.revoked { opacity: 0.6; border-color: var(--red-border); }
  .token-card-top { display: flex; justify-content: space-between; align-items: flex-start; gap: 12px; flex-wrap: wrap; }
  .token-info { flex: 1; min-width: 200px; }
  .token-code { font-family: 'Outfit', sans-serif; font-size: 17px; font-weight: 700; letter-spacing: -0.3px; }
  .token-customer { font-size: 13px; color: var(--text2); margin-top: 3px; }
  .status-badge {
    display: inline-flex; align-items: center; gap: 5px; padding: 3px 9px;
    border-radius: 99px; border: 1px solid; font-size: 10px; font-weight: 600; letter-spacing: 1px;
  }
  .status-badge.active { color: var(--green); background: var(--green-muted); border-color: var(--green-border); }
  .status-badge.revoked { color: var(--red); background: var(--red-muted); border-color: var(--red-border); }
  .status-badge.limit { color: var(--amber); background: var(--amber-muted); border-color: var(--amber-border); }
  .status-dot { width: 6px; height: 6px; border-radius: 50%; background: currentColor; }

  .device-bar { display: flex; align-items: center; gap: 8px; margin: 10px 0; font-size: 11px; color: var(--text3); }
  .bar-bg { flex: 1; height: 4px; border-radius: 99px; background: rgba(255,255,255,0.06); overflow: hidden; }
  .bar-fill { height: 100%; background: var(--green); border-radius: 99px; transition: width 0.3s; }
  .bar-fill.warn { background: var(--amber); }

  .token-extra {
    display: none;
    padding-top: 10px; margin-top: 10px; border-top: 1px solid var(--border);
    font-size: 12px; color: var(--text2); gap: 6px;
  }
  .token-extra.expanded { display: block; }
  .token-extra .info-row { margin-bottom: 4px; }

  .actions { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 12px; }
  .actions .btn { padding: 8px 12px; font-size: 12px; }

  .empty { text-align: center; padding: 60px 20px; color: var(--text3); }
  .loading { text-align: center; padding: 40px; color: var(--text2); }

  /* MODAL */
  .modal {
    display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,0.75); z-index: 100;
    align-items: center; justify-content: center; padding: 20px;
  }
  .modal.open { display: flex; }
  .modal-card {
    background: var(--surface); border: 1px solid var(--border); border-radius: 20px;
    padding: 24px; width: 100%; max-width: 500px; max-height: 90vh; overflow-y: auto;
  }
  .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
  .modal-header h2 { font-family: 'Outfit', sans-serif; font-size: 20px; font-weight: 700; }
  .modal-close { background: none; border: none; color: var(--text2); font-size: 22px; cursor: pointer; }
  .form-row { margin-bottom: 14px; }
  .form-error { color: var(--red); font-size: 12px; margin-bottom: 12px; display: none; }
  .form-error.show { display: block; }
  .modal-actions { display: flex; gap: 10px; margin-top: 20px; }
  .modal-actions .btn { flex: 1; justify-content: center; }

  /* TOAST */
  #toast {
    position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
    background: var(--surface2); border: 1px solid var(--border-strong);
    padding: 12px 20px; border-radius: 12px; font-size: 13px;
    z-index: 200; opacity: 0; transition: opacity 0.3s;
    pointer-events: none;
  }
  #toast.show { opacity: 1; }
  #toast.success { border-color: var(--green-border); color: var(--green); }
  #toast.error { border-color: var(--red-border); color: var(--red); }

  @media (max-width: 600px) {
    .stats { grid-template-columns: 1fr; }
    .header h1 { font-size: 16px; }
  }
</style>
</head>
<body>

<!-- LOGIN SCREEN -->
<div id="login">
  <div class="logo-wrap"><img src="/api/admin-logo" alt="Tom Certo" /></div>
  <h1>Tom Certo Admin</h1>
  <div class="sub">PAINEL DE GESTÃO DE TOKENS</div>
  <div class="row">
    <label for="admin-key-input">CHAVE DE ACESSO ADMIN</label>
    <input type="password" id="admin-key-input" placeholder="Digite sua chave admin" autocomplete="off" />
  </div>
  <div class="error" id="login-error"></div>
  <button class="btn btn-primary" id="login-btn">Entrar no Painel</button>
</div>

<!-- DASHBOARD -->
<div id="dash">
  <div class="header">
    <div>
      <h1><img class="hlogo" src="/api/admin-logo" alt="" />Tom Certo Admin</h1>
      <div class="backend-info" id="backend-info"></div>
    </div>
    <button class="btn btn-ghost" id="logout-btn">⎋ Sair</button>
  </div>

  <div class="stats">
    <div class="stat total"><div class="val" id="stat-total">0</div><div class="label">TOTAL</div></div>
    <div class="stat active"><div class="val" id="stat-active">0</div><div class="label">ATIVOS</div></div>
    <div class="stat revoked"><div class="val" id="stat-revoked">0</div><div class="label">REVOGADOS</div></div>
  </div>

  <div class="toolbar">
    <input type="text" class="search" id="search-input" placeholder="🔎 Buscar token ou cliente..." />
    <button class="btn btn-primary" id="new-token-btn">+ Novo Token</button>
    <button class="btn btn-ghost" id="refresh-btn">↻ Atualizar</button>
  </div>

  <div id="tokens-container">
    <div class="loading">Carregando tokens…</div>
  </div>
</div>

<!-- CREATE MODAL -->
<div class="modal" id="create-modal">
  <div class="modal-card">
    <div class="modal-header">
      <h2>Novo Token</h2>
      <button class="modal-close" data-close="create">✕</button>
    </div>
    <div class="form-row">
      <label>CÓDIGO*</label>
      <input id="new-code" placeholder="ex: ALUNO-001" />
    </div>
    <div class="form-row">
      <label>NOME DO CLIENTE</label>
      <input id="new-name" placeholder="ex: João Silva" />
    </div>
    <div class="form-row">
      <label>LIMITE DE DISPOSITIVOS</label>
      <input id="new-limit" type="number" value="3" min="1" />
    </div>
    <div class="form-row">
      <label>VALIDADE (dias) — vazio = sem expiração</label>
      <input id="new-duration" type="number" placeholder="ex: 30" />
    </div>
    <div class="form-row">
      <label>OBSERVAÇÕES</label>
      <input id="new-notes" placeholder="Opcional..." />
    </div>
    <div class="form-error" id="create-error"></div>
    <div class="modal-actions">
      <button class="btn btn-ghost" data-close="create">Cancelar</button>
      <button class="btn btn-primary" id="create-save">Criar Token</button>
    </div>
  </div>
</div>

<!-- EDIT MODAL -->
<div class="modal" id="edit-modal">
  <div class="modal-card">
    <div class="modal-header">
      <h2 id="edit-title">Editar Token</h2>
      <button class="modal-close" data-close="edit">✕</button>
    </div>
    <div class="form-row">
      <label>NOME DO CLIENTE</label>
      <input id="edit-name" />
    </div>
    <div class="form-row">
      <label>LIMITE DE DISPOSITIVOS</label>
      <input id="edit-limit" type="number" min="1" />
    </div>
    <div class="form-row">
      <label>OBSERVAÇÕES</label>
      <input id="edit-notes" />
    </div>
    <div class="form-error" id="edit-error"></div>
    <div class="modal-actions">
      <button class="btn btn-ghost" data-close="edit">Cancelar</button>
      <button class="btn btn-primary" id="edit-save">Salvar</button>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
  const STORAGE_KEY = 'tc_admin_key_v1';
  // Always use current origin; /api is proxied to backend
  const BASE = window.location.origin;

  let adminKey = '';
  let tokens = [];
  let editingTokenId = null;

  document.getElementById('backend-info').textContent = `Backend: ${BASE}`;

  // ─── API ─────────────────────────────────────────
  async function api(path, method = 'GET', body) {
    const opts = {
      method,
      headers: {
        'Content-Type': 'application/json',
        'X-Admin-Key': adminKey,
      },
    };
    if (body) opts.body = JSON.stringify(body);
    const res = await fetch(`${BASE}${path}`, opts);
    let data = {};
    try { data = await res.json(); } catch {}
    if (!res.ok) throw new Error(data?.detail || data?.message || `HTTP ${res.status}`);
    return data;
  }

  // ─── Toast ────────────────────────────────────────
  function toast(msg, type = '') {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className = 'show ' + type;
    setTimeout(() => { t.className = t.className.replace('show', ''); }, 2500);
  }

  // ─── LOGIN ────────────────────────────────────────
  async function doLogin() {
    const keyInput = document.getElementById('admin-key-input');
    const errEl = document.getElementById('login-error');
    const key = keyInput.value.trim();
    errEl.classList.remove('show');
    if (!key) { errEl.textContent = 'Digite a chave de acesso'; errEl.classList.add('show'); return; }
    adminKey = key;
    try {
      await api('/api/admin/stats');
      localStorage.setItem(STORAGE_KEY, key);
      document.getElementById('login').style.display = 'none';
      document.getElementById('dash').style.display = 'block';
      loadAll();
    } catch (e) {
      adminKey = '';
      errEl.textContent = 'Chave inválida ou servidor inacessível';
      errEl.classList.add('show');
    }
  }
  document.getElementById('login-btn').addEventListener('click', doLogin);
  document.getElementById('admin-key-input').addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });

  // Autologin se tiver chave salva
  const savedKey = localStorage.getItem(STORAGE_KEY);
  if (savedKey) {
    document.getElementById('admin-key-input').value = savedKey;
    adminKey = savedKey;
    api('/api/admin/stats').then(() => {
      document.getElementById('login').style.display = 'none';
      document.getElementById('dash').style.display = 'block';
      loadAll();
    }).catch(() => {
      adminKey = '';
    });
  }

  // ─── LOGOUT ───────────────────────────────────────
  document.getElementById('logout-btn').addEventListener('click', () => {
    localStorage.removeItem(STORAGE_KEY);
    adminKey = '';
    document.getElementById('login').style.display = 'block';
    document.getElementById('dash').style.display = 'none';
    document.getElementById('admin-key-input').value = '';
  });

  // ─── LOAD ─────────────────────────────────────────
  async function loadAll() {
    try {
      const [tk, st] = await Promise.all([
        api('/api/admin/tokens'),
        api('/api/admin/stats'),
      ]);
      tokens = tk.tokens || [];
      document.getElementById('stat-total').textContent = st.total;
      document.getElementById('stat-active').textContent = st.active;
      document.getElementById('stat-revoked').textContent = st.revoked;
      render();
    } catch (e) {
      toast('Erro: ' + e.message, 'error');
    }
  }
  document.getElementById('refresh-btn').addEventListener('click', () => { loadAll(); toast('Atualizado ✓', 'success'); });

  // ─── RENDER ───────────────────────────────────────
  function render() {
    const q = document.getElementById('search-input').value.trim().toLowerCase();
    const filtered = tokens.filter(t => {
      if (!q) return true;
      return t.code.toLowerCase().includes(q)
        || (t.customer_name || '').toLowerCase().includes(q)
        || (t.notes || '').toLowerCase().includes(q);
    });

    const container = document.getElementById('tokens-container');
    if (filtered.length === 0) {
      container.innerHTML = '<div class="empty">🔑 Nenhum token encontrado</div>';
      return;
    }

    container.innerHTML = '<div class="tokens-list">' + filtered.map(t => {
      const devCount = (t.active_devices || []).length;
      const limit = t.device_limit || 1;
      const pct = Math.min(100, Math.round((devCount / limit) * 100));
      const atLimit = devCount >= limit;
      const statusClass = !t.active ? 'revoked' : atLimit ? 'limit' : 'active';
      const statusText = !t.active ? 'Revogado' : atLimit ? 'Limite atingido' : 'Ativo';

      const expires = t.expires_at ? `Expira: ${new Date(t.expires_at).toLocaleDateString('pt-BR')}` : '';
      const lastUse = t.last_used_at ? `Último uso: ${new Date(t.last_used_at).toLocaleDateString('pt-BR')}` : '';
      const notes = t.notes ? `📝 ${t.notes}` : '';

      return `
        <div class="token-card ${!t.active ? 'revoked' : ''}" data-id="${t._id}">
          <div class="token-card-top">
            <div class="token-info">
              <div class="token-code">${escapeHtml(t.code)}</div>
              ${t.customer_name ? `<div class="token-customer">${escapeHtml(t.customer_name)}</div>` : ''}
            </div>
            <span class="status-badge ${statusClass}"><span class="status-dot"></span>${statusText}</span>
          </div>
          <div class="device-bar">
            <span>${devCount}/${limit} dispositivos</span>
            <div class="bar-bg"><div class="bar-fill ${atLimit ? 'warn' : ''}" style="width:${pct}%"></div></div>
          </div>
          <div class="token-extra expanded">
            ${notes ? `<div class="info-row">${escapeHtml(notes)}</div>` : ''}
            ${expires ? `<div class="info-row">⏰ ${expires}</div>` : ''}
            ${lastUse ? `<div class="info-row">🟢 ${lastUse}</div>` : ''}
            <div class="actions">
              <button class="btn ${t.active ? 'btn-danger' : 'btn-success'}" data-action="toggle" data-id="${t._id}">
                ${t.active ? '⛔ Revogar' : '✓ Ativar'}
              </button>
              <button class="btn btn-amber" data-action="clear" data-id="${t._id}">📱 Limpar devices</button>
              <button class="btn btn-blue" data-action="edit" data-id="${t._id}">✎ Editar</button>
              <button class="btn btn-danger" data-action="delete" data-id="${t._id}">🗑 Excluir</button>
            </div>
          </div>
        </div>
      `;
    }).join('') + '</div>';

    // Bind action buttons
    container.querySelectorAll('[data-action]').forEach(btn => {
      btn.addEventListener('click', handleAction);
    });
  }

  function escapeHtml(s) {
    return String(s || '').replace(/[&<>"']/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));
  }

  document.getElementById('search-input').addEventListener('input', render);

  // ─── ACTIONS ──────────────────────────────────────
  async function handleAction(e) {
    const btn = e.currentTarget;
    const action = btn.getAttribute('data-action');
    const id = btn.getAttribute('data-id');
    const t = tokens.find(x => x._id === id);
    if (!t) return;

    if (action === 'toggle') {
      try {
        await api(`/api/admin/tokens/${id}`, 'PATCH', { active: !t.active });
        toast(t.active ? 'Token revogado' : 'Token ativado', 'success');
        loadAll();
      } catch (e) { toast('Erro: ' + e.message, 'error'); }
    } else if (action === 'clear') {
      if (!confirm(`Remover ${t.active_devices.length} dispositivo(s) de "${t.code}"?`)) return;
      try {
        await api(`/api/admin/tokens/${id}/clear-devices`, 'POST');
        toast('Dispositivos limpos', 'success');
        loadAll();
      } catch (e) { toast('Erro: ' + e.message, 'error'); }
    } else if (action === 'delete') {
      if (!confirm(`Excluir "${t.code}" permanentemente?`)) return;
      try {
        await api(`/api/admin/tokens/${id}`, 'DELETE');
        toast('Token excluído', 'success');
        loadAll();
      } catch (e) { toast('Erro: ' + e.message, 'error'); }
    } else if (action === 'edit') {
      openEdit(t);
    }
  }

  // ─── CREATE ───────────────────────────────────────
  document.getElementById('new-token-btn').addEventListener('click', () => {
    document.getElementById('new-code').value = '';
    document.getElementById('new-name').value = '';
    document.getElementById('new-limit').value = '3';
    document.getElementById('new-duration').value = '';
    document.getElementById('new-notes').value = '';
    document.getElementById('create-error').classList.remove('show');
    openModal('create');
  });

  document.getElementById('create-save').addEventListener('click', async () => {
    const code = document.getElementById('new-code').value.trim().toUpperCase();
    const errEl = document.getElementById('create-error');
    if (!code) { errEl.textContent = 'Código obrigatório'; errEl.classList.add('show'); return; }
    const body = {
      code,
      customer_name: document.getElementById('new-name').value.trim() || null,
      device_limit: parseInt(document.getElementById('new-limit').value) || 3,
      notes: document.getElementById('new-notes').value.trim() || null,
    };
    const days = parseInt(document.getElementById('new-duration').value);
    if (days && days > 0) body.duration_minutes = days * 24 * 60;
    try {
      await api('/api/admin/tokens', 'POST', body);
      closeModal('create');
      toast('Token criado ✓', 'success');
      loadAll();
    } catch (e) {
      errEl.textContent = e.message;
      errEl.classList.add('show');
    }
  });

  // ─── EDIT ─────────────────────────────────────────
  function openEdit(t) {
    editingTokenId = t._id;
    document.getElementById('edit-title').textContent = `Editar ${t.code}`;
    document.getElementById('edit-name').value = t.customer_name || '';
    document.getElementById('edit-limit').value = t.device_limit || 3;
    document.getElementById('edit-notes').value = t.notes || '';
    document.getElementById('edit-error').classList.remove('show');
    openModal('edit');
  }

  document.getElementById('edit-save').addEventListener('click', async () => {
    if (!editingTokenId) return;
    const errEl = document.getElementById('edit-error');
    const body = {
      customer_name: document.getElementById('edit-name').value.trim() || null,
      device_limit: parseInt(document.getElementById('edit-limit').value) || 3,
      notes: document.getElementById('edit-notes').value.trim() || null,
    };
    try {
      await api(`/api/admin/tokens/${editingTokenId}`, 'PATCH', body);
      closeModal('edit');
      toast('Alterações salvas ✓', 'success');
      loadAll();
    } catch (e) {
      errEl.textContent = e.message;
      errEl.classList.add('show');
    }
  });

  // ─── MODAL HELPERS ────────────────────────────────
  function openModal(name) { document.getElementById(`${name}-modal`).classList.add('open'); }
  function closeModal(name) { document.getElementById(`${name}-modal`).classList.remove('open'); }
  document.querySelectorAll('[data-close]').forEach(el => {
    el.addEventListener('click', () => closeModal(el.getAttribute('data-close')));
  });
  document.querySelectorAll('.modal').forEach(m => {
    m.addEventListener('click', (e) => { if (e.target === m) m.classList.remove('open'); });
  });
</script>
</body>
</html>

<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
<title>Tom Certo · Admin</title>
<style>
  :root {
    --bg: #0A0A0A;
    --surface: #131313;
    --surface2: #1A1A1A;
    --surface3: #232323;
    --border: #232323;
    --border2: #2D2D2D;
    --gold: #FFB020;
    --gold2: #FFD166;
    --gold-soft: rgba(255,176,32,0.10);
    --gold-border: rgba(255,176,32,0.32);
    --green: #22C55E;
    --green-soft: rgba(34,197,94,0.16);
    --red: #EF4444;
    --red-soft: rgba(239,68,68,0.14);
    --blue: #60A5FA;
    --text: #FFFFFF;
    --text2: #9BA1A6;
    --text3: #687280;
    --text4: #4A5159;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }
  button { cursor: pointer; }
  input, select, textarea, button { font-family: inherit; font-size: 14px; }
  input, select, textarea {
    background: var(--surface2);
    border: 1px solid var(--border2);
    color: var(--text);
    border-radius: 10px;
    padding: 10px 12px;
    width: 100%;
    outline: none;
    transition: border-color 0.15s;
  }
  input:focus, select:focus, textarea:focus { border-color: var(--gold); }
  label { display: block; font-size: 11px; font-weight: 600; color: var(--text2); letter-spacing: 1.3px; margin-bottom: 6px; text-transform: uppercase; }

  /* ─── Layout ─── */
  .wrap { max-width: 1200px; margin: 0 auto; padding: 28px 20px 80px; }
  .header { display: flex; align-items: center; gap: 16px; margin-bottom: 28px; }
  .header img { width: 38px; height: 38px; }
  .header h1 { font-size: 22px; margin: 0; font-weight: 700; }
  .header .pill { padding: 4px 10px; border-radius: 999px; background: var(--green-soft); color: var(--green); font-size: 11px; font-weight: 700; letter-spacing: 1.2px; border: 1px solid rgba(34,197,94,0.4); }
  .header .spacer { flex: 1; }

  /* ─── Stats ─── */
  .stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; margin-bottom: 22px; }
  .stat {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 16px 18px;
  }
  .stat .lbl { font-size: 11px; color: var(--text2); letter-spacing: 1.4px; font-weight: 600; }
  .stat .val { font-size: 28px; font-weight: 800; margin-top: 6px; }
  .stat.gold .val { color: var(--gold); }
  .stat.green .val { color: var(--green); }
  .stat.red .val { color: var(--red); }
  @media (max-width: 720px) {
    .stats { grid-template-columns: repeat(2, 1fr); }
  }

  /* ─── Toolbar ─── */
  .toolbar { display: flex; gap: 10px; align-items: center; margin-bottom: 16px; flex-wrap: wrap; }
  .toolbar input.search { flex: 1; min-width: 220px; }
  .btn {
    padding: 10px 16px;
    border-radius: 10px;
    border: 1px solid transparent;
    font-weight: 600;
    transition: all 0.15s;
    white-space: nowrap;
  }
  .btn-primary { background: var(--gold); color: #0A0A0A; }
  .btn-primary:hover { background: var(--gold2); }
  .btn-ghost { background: var(--surface2); color: var(--text); border-color: var(--border2); }
  .btn-ghost:hover { background: var(--surface3); }
  .btn-success { background: var(--green-soft); color: var(--green); border-color: rgba(34,197,94,0.4); }
  .btn-danger { background: var(--red-soft); color: var(--red); border-color: rgba(239,68,68,0.4); }
  .btn-blue { background: rgba(96,165,250,0.14); color: var(--blue); border-color: rgba(96,165,250,0.4); }
  .btn-amber { background: var(--gold-soft); color: var(--gold); border-color: var(--gold-border); }
  .btn-sm { padding: 6px 12px; font-size: 12px; border-radius: 8px; }

  /* ─── Token list ─── */
  .token-grid { display: grid; gap: 10px; }
  .token-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 16px 18px;
    display: grid;
    grid-template-columns: 1fr auto;
    gap: 12px;
    align-items: center;
    transition: border-color 0.15s;
  }
  .token-card:hover { border-color: var(--border2); }
  .token-card.revoked { opacity: 0.55; }
  .token-card.expired { border-color: rgba(239,68,68,0.30); }

  .tok-info { min-width: 0; }
  .tok-row1 { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; margin-bottom: 6px; }
  .tok-code { font-family: 'SF Mono', Menlo, Consolas, monospace; font-size: 15px; font-weight: 700; color: var(--gold); cursor: pointer; user-select: all; }
  .tok-code:hover { color: var(--gold2); }
  .tok-name { color: var(--text); font-weight: 600; font-size: 14px; }
  .tok-name.empty { color: var(--text3); font-weight: 400; font-style: italic; }
  .badge {
    padding: 2px 8px;
    border-radius: 999px;
    font-size: 10.5px;
    font-weight: 700;
    letter-spacing: 0.6px;
  }
  .badge-active { background: var(--green-soft); color: var(--green); }
  .badge-revoked { background: var(--red-soft); color: var(--red); }
  .badge-expired { background: rgba(255,176,32,0.14); color: var(--gold); }
  .badge-forever { background: rgba(96,165,250,0.14); color: var(--blue); }

  .tok-meta { display: flex; gap: 14px; font-size: 12px; color: var(--text2); flex-wrap: wrap; }
  .tok-meta span { display: inline-flex; align-items: center; gap: 5px; }
  .tok-meta strong { color: var(--text); font-weight: 600; }
  .tok-actions { display: flex; gap: 6px; flex-wrap: wrap; justify-content: flex-end; }

  @media (max-width: 720px) {
    .token-card { grid-template-columns: 1fr; }
    .tok-actions { justify-content: flex-start; }
  }

  /* ─── Modal ─── */
  .modal-bg {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.78); backdrop-filter: blur(4px);
    display: flex; align-items: center; justify-content: center;
    z-index: 1000; padding: 16px;
    opacity: 0; pointer-events: none;
    transition: opacity 0.18s;
  }
  .modal-bg.open { opacity: 1; pointer-events: auto; }
  .modal {
    background: var(--surface);
    border: 1px solid var(--border2);
    border-radius: 18px;
    padding: 28px;
    width: 100%; max-width: 480px;
    max-height: 90vh; overflow-y: auto;
  }
  .modal h2 { margin: 0 0 18px; font-size: 18px; }
  .form-row { margin-bottom: 14px; }
  .form-row .row { display: flex; gap: 8px; }
  .form-row .row > * { flex: 1; }
  .modal-footer { display: flex; gap: 10px; margin-top: 22px; justify-content: flex-end; }

  /* ─── Toast ─── */
  .toast {
    position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
    background: var(--surface);
    border: 1px solid var(--gold-border);
    color: var(--text);
    padding: 12px 20px;
    border-radius: 999px;
    font-size: 13px;
    font-weight: 600;
    z-index: 2000;
    opacity: 0; pointer-events: none;
    transition: opacity 0.18s, transform 0.18s;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(-4px); }
  .toast.success { border-color: rgba(34,197,94,0.4); color: var(--green); }
  .toast.error { border-color: rgba(239,68,68,0.4); color: var(--red); }

  /* ─── Login ─── */
  .login-screen {
    min-height: 100vh;
    display: flex; align-items: center; justify-content: center;
    padding: 16px;
  }
  .login-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 18px;
    padding: 32px;
    width: 100%; max-width: 380px;
    text-align: center;
  }
  .login-card img { width: 56px; height: 56px; }
  .login-card h2 { font-size: 20px; margin: 14px 0 6px; font-weight: 700; }
  .login-card p { color: var(--text2); font-size: 13px; margin: 0 0 22px; }
  .empty {
    text-align: center; padding: 60px 20px; color: var(--text2);
    background: var(--surface);
    border: 1px dashed var(--border2); border-radius: 14px;
  }
  .copy-hint { font-size: 10px; color: var(--text3); margin-left: 4px; }

  /* ─── Selection Bar ─── */
  .selection-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 12px 16px;
    margin-bottom: 16px;
  }
  .selection-info {
    display: flex;
    align-items: center;
  }
  .selection-info input[type="checkbox"] {
    width: 18px;
    height: 18px;
    cursor: pointer;
  }
  .selection-actions {
    display: flex;
    gap: 10px;
  }
  .token-checkbox {
    width: 18px;
    height: 18px;
    cursor: pointer;
    margin-right: 12px;
    flex-shrink: 0;
  }

  /* ─── Result modal (show new token) ─── */
  .result-key {
    font-family: 'SF Mono', Menlo, Consolas, monospace;
    background: var(--surface2);
    border: 2px dashed var(--gold-border);
    border-radius: 12px;
    padding: 16px;
    text-align: center;
    font-size: 22px;
    font-weight: 700;
    color: var(--gold);
    user-select: all;
    cursor: pointer;
    margin: 16px 0;
  }
  .result-key:hover { background: var(--surface3); }
</style>
</head>
<body>

<!-- Login Screen -->
<div id="login-view" class="login-screen">
  <div class="login-card">
    <img src="/api/admin-logo" alt="Tom Certo" onerror="this.style.display='none'" />
    <h2>Tom Certo · Admin</h2>
    <p>Painel de gerenciamento de tokens</p>
    <div class="form-row" style="text-align: left;">
      <label>USUÁRIO</label>
      <input type="text" id="admin-user" placeholder="Digite seu usuário" autocomplete="username" autocapitalize="none" autocorrect="off" spellcheck="false" />
    </div>
    <div class="form-row" style="text-align: left; margin-top: 10px;">
      <label>SENHA</label>
      <input type="password" id="admin-pass" placeholder="Digite sua senha" autocomplete="current-password" />
    </div>
    <button class="btn btn-primary" id="login-btn" style="width: 100%; margin-top: 14px;">Entrar</button>
    <div id="login-error" style="color: var(--red); font-size: 12px; margin-top: 12px; display: none;"></div>
  </div>
</div>

<!-- App -->
<div id="app-view" class="wrap" style="display: none;">
  <div class="header">
    <img src="/api/admin-logo" alt="" onerror="this.style.display='none'" />
    <h1>Tom Certo · Admin</h1>
    <span class="pill" id="conn-pill">CONECTADO</span>
    <div class="spacer"></div>
    <button class="btn btn-ghost btn-sm" id="logout-btn">Sair</button>
  </div>

  <div class="stats">
    <div class="stat gold">
      <div class="lbl">Total</div>
      <div class="val" id="stat-total">—</div>
    </div>
    <div class="stat green">
      <div class="lbl">Ativos</div>
      <div class="val" id="stat-active">—</div>
    </div>
    <div class="stat" style="--accent: var(--gold);">
      <div class="lbl">Expirados</div>
      <div class="val" id="stat-expired" style="color: var(--gold);">—</div>
    </div>
    <div class="stat red">
      <div class="lbl">Cancelados</div>
      <div class="val" id="stat-cancelled">—</div>
    </div>
  </div>

  <div class="toolbar">
    <input type="text" class="search" id="search" placeholder="Buscar por código, nome ou email…" />
    <select id="filter-status" style="width: auto; min-width: 130px;">
      <option value="">Todos</option>
      <option value="ativo">✓ Ativos</option>
      <option value="expirado">⏱ Expirados</option>
      <option value="cancelado">✕ Cancelados</option>
    </select>
    <select id="filter-plan" style="width: auto; min-width: 130px;">
      <option value="">Todos os planos</option>
      <option value="mensal">Mensal</option>
      <option value="trimestral">Trimestral</option>
      <option value="semestral">Semestral</option>
    </select>
    <button class="btn btn-ghost" id="refresh-btn">↻ Atualizar</button>
    <button class="btn btn-primary" id="new-btn">+ Novo Token</button>
  </div>

  <!-- Barra de Seleção Múltipla -->
  <div id="selection-bar" class="selection-bar" style="display: none;">
    <div class="selection-info">
      <input type="checkbox" id="select-all" />
      <label for="select-all" style="margin-left: 8px; font-weight: 600; cursor: pointer;">
        <span id="selection-count">0</span> selecionado(s)
      </label>
    </div>
    <div class="selection-actions">
      <button class="btn btn-sm btn-danger" id="delete-selected">🗑 Excluir Selecionados</button>
      <button class="btn btn-sm btn-danger" id="delete-all" style="background: #7F1D1D; border-color: #991B1B;">⚠️ Excluir TODOS</button>
    </div>
  </div>

  <div id="token-list" class="token-grid"></div>
  <div id="empty" class="empty" style="display: none;">Nenhum token encontrado.</div>
</div>

<!-- Create Modal -->
<div id="create-modal" class="modal-bg">
  <div class="modal">
    <h2>Criar novo token</h2>

    <div class="form-row">
      <label>Nome do usuário <span class="copy-hint">(opcional)</span></label>
      <input id="c-name" placeholder="ex: João Silva" autofocus />
    </div>

    <div class="form-row">
      <label>Código do token</label>
      <div class="row">
        <input id="c-code" placeholder="Auto-gerado se vazio (ex: TC-A1B2-C3D4)" style="font-family: monospace; flex: 3;" />
        <button class="btn btn-ghost" id="c-gen-btn" type="button" style="flex: 1; min-width: 110px;">⚡ Gerar</button>
      </div>
    </div>

    <div class="form-row">
      <label>Duração</label>
      <div class="row">
        <input id="c-duration-value" type="number" min="1" placeholder="ex: 30" style="flex: 2;" />
        <select id="c-duration-unit" style="flex: 3;">
          <option value="forever">Sem expiração</option>
          <option value="minutes">Minutos</option>
          <option value="hours">Horas</option>
          <option value="days" selected>Dias</option>
          <option value="months">Meses</option>
          <option value="years">Anos</option>
        </select>
      </div>
    </div>

    <div class="form-row">
      <label>Limite de dispositivos</label>
      <input id="c-limit" type="number" min="1" max="100" value="3" />
    </div>

    <div class="form-row">
      <label>Observações <span class="copy-hint">(opcional)</span></label>
      <input id="c-notes" placeholder="ex: assinatura mensal cliente premium" />
    </div>

    <div id="c-error" style="color: var(--red); font-size: 12px; display: none; margin-top: 4px;"></div>

    <div class="modal-footer">
      <button class="btn btn-ghost" data-close="create">Cancelar</button>
      <button class="btn btn-primary" id="c-save">Criar Token</button>
    </div>
  </div>
</div>

<!-- Result Modal (after creation) -->
<div id="result-modal" class="modal-bg">
  <div class="modal">
    <h2 style="color: var(--green);">✓ Token criado</h2>
    <p style="color: var(--text2); font-size: 13px; margin: 0 0 6px;">Compartilhe este código com o usuário:</p>
    <div class="result-key" id="r-code" title="Clique para copiar">—</div>
    <div id="r-info" style="color: var(--text2); font-size: 13px; line-height: 1.6;"></div>
    <div class="modal-footer">
      <button class="btn btn-ghost" id="r-copy">📋 Copiar código</button>
      <button class="btn btn-primary" data-close="result">Fechar</button>
    </div>
  </div>
</div>

<!-- Edit Modal -->
<div id="edit-modal" class="modal-bg">
  <div class="modal">
    <h2>Editar token</h2>
    <div class="form-row">
      <label>Nome</label>
      <input id="e-name" />
    </div>
    <div class="form-row">
      <label>Limite de dispositivos</label>
      <input id="e-limit" type="number" min="1" max="100" />
    </div>
    <div class="form-row">
      <label>Observações</label>
      <input id="e-notes" />
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" data-close="edit">Cancelar</button>
      <button class="btn btn-primary" id="e-save">Salvar</button>
    </div>
  </div>
</div>

<div id="toast" class="toast"></div>

<script>
const BASE = '/api';
let ADMIN_TOKEN = '';   // JWT do login
let ADMIN_USER = '';    // username do admin logado
let TOKENS = [];

const $ = (id) => document.getElementById(id);
const showToast = (msg, type = '') => {
  const t = $('toast');
  t.textContent = msg;
  t.className = 'toast show ' + (type || '');
  clearTimeout(t._tid);
  t._tid = setTimeout(() => t.classList.remove('show'), 2400);
};

async function api(path, opts = {}) {
  const headers = Object.assign({}, opts.headers || {});
  if (ADMIN_TOKEN) headers['Authorization'] = 'Bearer ' + ADMIN_TOKEN;
  if (opts.body && typeof opts.body !== 'string') {
    headers['Content-Type'] = 'application/json';
    opts.body = JSON.stringify(opts.body);
  }
  const res = await fetch(BASE + path, Object.assign({}, opts, { headers }));
  const ct = res.headers.get('content-type') || '';
  const data = ct.includes('application/json') ? await res.json() : await res.text();
  if (!res.ok) {
    // Sessão expirada → força logout
    if (res.status === 401 && ADMIN_TOKEN) {
      doLogout(true);
    }
    const detail = (data && (data.detail || data.message)) || res.statusText || 'Erro';
    throw new Error(detail);
  }
  return data;
}

// ─── Login ────────────────────────────────────────────────────────────
async function doLogin() {
  const username = $('admin-user').value.trim();
  const password = $('admin-pass').value;
  if (!username || !password) {
    $('login-error').textContent = 'Informe usuário e senha.';
    $('login-error').style.display = 'block';
    return;
  }
  $('login-error').style.display = 'none';
  $('login-btn').disabled = true;
  $('login-btn').textContent = 'Entrando...';
  try {
    const res = await fetch(BASE + '/admin/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username, password }),
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.detail || 'Falha no login');
    ADMIN_TOKEN = data.token;
    ADMIN_USER = data.username;
    localStorage.setItem('tc_admin_jwt', ADMIN_TOKEN);
    localStorage.setItem('tc_admin_user', ADMIN_USER);
    // limpa chaves antigas (legacy)
    localStorage.removeItem('tc_admin_key');
    $('admin-pass').value = '';
    $('login-view').style.display = 'none';
    $('app-view').style.display = 'block';
    await refresh();
  } catch (e) {
    $('login-error').textContent = e.message || 'Usuário ou senha inválidos.';
    $('login-error').style.display = 'block';
  } finally {
    $('login-btn').disabled = false;
    $('login-btn').textContent = 'Entrar';
  }
}
$('login-btn').addEventListener('click', doLogin);
$('admin-user').addEventListener('keydown', e => { if (e.key === 'Enter') $('admin-pass').focus(); });
$('admin-pass').addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });

// Auto-login com JWT salvo
window.addEventListener('DOMContentLoaded', async () => {
  const saved = localStorage.getItem('tc_admin_jwt');
  const savedUser = localStorage.getItem('tc_admin_user');
  if (saved) {
    ADMIN_TOKEN = saved;
    ADMIN_USER = savedUser || '';
    try {
      await api('/admin/me');
      $('login-view').style.display = 'none';
      $('app-view').style.display = 'block';
      await refresh();
    } catch {
      // JWT expirado/inválido — limpa e mostra login
      ADMIN_TOKEN = '';
      ADMIN_USER = '';
      localStorage.removeItem('tc_admin_jwt');
      localStorage.removeItem('tc_admin_user');
    }
  }
});

function doLogout(silent) {
  localStorage.removeItem('tc_admin_jwt');
  localStorage.removeItem('tc_admin_user');
  localStorage.removeItem('tc_admin_key');
  ADMIN_TOKEN = '';
  ADMIN_USER = '';
  $('app-view').style.display = 'none';
  $('login-view').style.display = 'flex';
  $('admin-user').value = '';
  $('admin-pass').value = '';
  if (silent) {
    $('login-error').textContent = 'Sessão expirada. Faça login novamente.';
    $('login-error').style.display = 'block';
  } else {
    $('login-error').style.display = 'none';
  }
}
$('logout-btn').addEventListener('click', () => doLogout(false));

// ─── Refresh ──────────────────────────────────────────────────────────
async function refresh() {
  try {
    const [stats, tokens] = await Promise.all([api('/admin/stats'), api('/admin/tokens')]);
    TOKENS = tokens.tokens || [];
    
    // Calcular stats localmente para incluir novos campos
    const now = new Date();
    let active = 0, expired = 0, cancelled = 0;
    
    for (const t of TOKENS) {
      const tokenStatus = t.status || (t.active ? 'ativo' : 'cancelado');
      const isExp = t.expires_at && new Date(t.expires_at) < now;
      
      if (tokenStatus === 'cancelado' || !t.active) {
        cancelled++;
      } else if (isExp) {
        expired++;
      } else {
        active++;
      }
    }
    
    $('stat-total').textContent = TOKENS.length;
    $('stat-active').textContent = active;
    $('stat-expired').textContent = expired;
    $('stat-cancelled').textContent = cancelled;
    
    render();
    $('conn-pill').textContent = 'CONECTADO';
    $('conn-pill').style.background = 'var(--green-soft)';
    $('conn-pill').style.color = 'var(--green)';
    $('conn-pill').style.borderColor = 'rgba(34,197,94,0.4)';
  } catch (e) {
    $('conn-pill').textContent = 'DESCONECTADO';
    $('conn-pill').style.background = 'var(--red-soft)';
    $('conn-pill').style.color = 'var(--red)';
    $('conn-pill').style.borderColor = 'rgba(239,68,68,0.4)';
    showToast('Erro: ' + e.message, 'error');
  }
}
$('refresh-btn').addEventListener('click', refresh);

// ─── Render list ──────────────────────────────────────────────────────
function fmtRelative(iso) {
  if (!iso) return null;
  const d = new Date(iso);
  if (isNaN(+d)) return null;
  const now = Date.now();
  const ms = +d - now;
  const past = ms < 0;
  const abs = Math.abs(ms);
  const min = Math.round(abs / 60000);
  const h = Math.round(abs / 3600000);
  const days = Math.round(abs / 86400000);
  const months = Math.round(abs / (86400000 * 30));
  let s;
  if (min < 60) s = min + 'min';
  else if (h < 48) s = h + 'h';
  else if (days < 60) s = days + ' dias';
  else s = months + ' meses';
  return past ? 'expirou há ' + s : 'expira em ' + s;
}

function fmtCreated(iso) {
  if (!iso) return '—';
  try { return new Date(iso).toLocaleDateString('pt-BR'); } catch { return iso.slice(0, 10); }
}

function isExpired(t) {
  if (!t.expires_at) return false;
  try { return new Date(t.expires_at) < new Date(); } catch { return false; }
}

function render() {
  const q = ($('search').value || '').trim().toLowerCase();
  const statusFilter = $('filter-status').value;
  const planFilter = $('filter-plan').value;
  
  const filtered = TOKENS.filter(t => {
    // Filtro de texto
    if (q) {
      const matchText = (t.code || '').toLowerCase().includes(q) ||
             (t.token || '').toLowerCase().includes(q) ||
             (t.customer_name || '').toLowerCase().includes(q) ||
             (t.nome_usuario || '').toLowerCase().includes(q) ||
             (t.email_compra || '').toLowerCase().includes(q) ||
             (t.notes || '').toLowerCase().includes(q);
      if (!matchText) return false;
    }
    
    // Filtro de status
    if (statusFilter) {
      const tokenStatus = t.status || (t.active ? 'ativo' : 'cancelado');
      const expired = isExpired(t);
      if (statusFilter === 'ativo' && (tokenStatus !== 'ativo' || expired)) return false;
      if (statusFilter === 'expirado' && !expired) return false;
      if (statusFilter === 'cancelado' && tokenStatus !== 'cancelado') return false;
    }
    
    // Filtro de plano
    if (planFilter && t.plano !== planFilter) return false;
    
    return true;
  });
  
  const list = $('token-list');
  list.innerHTML = '';
  if (filtered.length === 0) {
    $('empty').style.display = 'block';
    $('empty').textContent = TOKENS.length === 0
      ? 'Nenhum token criado ainda. Clique em "+ Novo Token" para começar.'
      : 'Nenhum token corresponde aos filtros.';
    return;
  }
  $('empty').style.display = 'none';
  for (const t of filtered) {
    const expired = isExpired(t);
    const tokenStatus = t.status || (t.active ? 'ativo' : 'cancelado');
    const isForever = !t.expires_at && t.active;
    const isCancelled = tokenStatus === 'cancelado' || !t.active;
    
    const statusBadge = isCancelled
      ? '<span class="badge badge-revoked">CANCELADO</span>'
      : expired
        ? '<span class="badge badge-expired">EXPIRADO</span>'
        : isForever
          ? '<span class="badge badge-forever">SEM EXPIRAÇÃO</span>'
          : '<span class="badge badge-active">ATIVO</span>';

    // Badge do plano
    const planBadges = {
      'mensal': '<span class="badge" style="background:rgba(96,165,250,0.14);color:var(--blue);">MENSAL</span>',
      'trimestral': '<span class="badge" style="background:var(--gold-soft);color:var(--gold);">TRIMESTRAL</span>',
      'semestral': '<span class="badge" style="background:var(--green-soft);color:var(--green);">SEMESTRAL</span>',
    };
    const planBadge = t.plano ? planBadges[t.plano] || '' : '';

    const expRel = t.expires_at ? fmtRelative(t.expires_at) : null;
    const devCount = (t.active_devices || []).length;
    const devLimit = t.device_limit || t.max_devices || 1;
    const tokenCode = t.token || t.code;
    const customerName = t.nome_usuario || t.customer_name;
    const customerEmail = t.email_compra;

    const card = document.createElement('div');
    card.className = 'token-card' + (isCancelled ? ' revoked' : '') + (expired ? ' expired' : '');
    card.innerHTML = `
      <div class="tok-info">
        <div class="tok-row1">
          <span class="tok-code" data-copy="${tokenCode}" title="Clique para copiar">${tokenCode}</span>
          ${statusBadge}
          ${planBadge}
        </div>
        <div class="tok-row1" style="margin-top: 6px;">
          <span class="${customerName ? 'tok-name' : 'tok-name empty'}">${customerName || 'Sem nome'}</span>
          ${customerEmail ? `<span style="color:var(--text2);font-size:12px;">📧 ${customerEmail}</span>` : ''}
        </div>
        <div class="tok-meta">
          <span>📱 <strong>${devCount}</strong>/${devLimit} dispositivo${devLimit > 1 ? 's' : ''}</span>
          ${expRel ? `<span>⏱ ${expRel}</span>` : ''}
          <span>📅 criado ${fmtCreated(t.created_at)}</span>
          ${t.notes ? `<span>📝 ${t.notes}</span>` : ''}
        </div>
      </div>
      <div class="tok-actions">
        <button class="btn btn-sm btn-amber" data-action="copy" data-code="${tokenCode}">📋 Copiar</button>
        <button class="btn btn-sm btn-blue" data-action="edit" data-id="${t._id}">✎ Editar</button>
        ${devCount > 0 ? `<button class="btn btn-sm btn-amber" data-action="clear" data-id="${t._id}">📱 Liberar</button>` : ''}
        <button class="btn btn-sm ${!isCancelled ? 'btn-danger' : 'btn-success'}" data-action="toggle" data-id="${t._id}" data-active="${!isCancelled}">
          ${!isCancelled ? '✕ Cancelar' : '✓ Reativar'}
        </button>
        <button class="btn btn-sm btn-danger" data-action="delete" data-id="${t._id}">🗑</button>
      </div>
    `;
    list.appendChild(card);
  }
}
$('search').addEventListener('input', render);
$('filter-status').addEventListener('change', render);
$('filter-plan').addEventListener('change', render);

// Action delegation
$('token-list').addEventListener('click', async (e) => {
  const btn = e.target.closest('[data-action]');
  if (btn) {
    const action = btn.dataset.action;
    const id = btn.dataset.id;
    if (action === 'copy') {
      const code = btn.dataset.code;
      try { await navigator.clipboard.writeText(code); showToast('Código copiado: ' + code, 'success'); }
      catch { showToast('Falha ao copiar', 'error'); }
      return;
    }
    if (action === 'toggle') {
      const cur = btn.dataset.active === 'true';
      try { await api('/admin/tokens/' + id, { method: 'PATCH', body: { active: !cur } }); showToast(cur ? 'Token revogado' : 'Token reativado', 'success'); await refresh(); }
      catch (err) { showToast('Erro: ' + err.message, 'error'); }
      return;
    }
    if (action === 'clear') {
      try { await api('/admin/tokens/' + id + '/clear-devices', { method: 'POST' }); showToast('Dispositivos liberados', 'success'); await refresh(); }
      catch (err) { showToast('Erro: ' + err.message, 'error'); }
      return;
    }
    if (action === 'delete') {
      if (!confirm('Excluir este token permanentemente?')) return;
      try { await api('/admin/tokens/' + id, { method: 'DELETE' }); showToast('Token excluído', 'success'); await refresh(); }
      catch (err) { showToast('Erro: ' + err.message, 'error'); }
      return;
    }
    if (action === 'edit') {
      const t = TOKENS.find(x => x._id === id);
      if (!t) return;
      openEdit(t);
      return;
    }
  }
  // Click no código copia
  const codeEl = e.target.closest('[data-copy]');
  if (codeEl) {
    try { await navigator.clipboard.writeText(codeEl.dataset.copy); showToast('Código copiado', 'success'); } catch {}
  }
});

// ─── Modals ────────────────────────────────────────────────────────────
function openModal(id) { $(id + '-modal').classList.add('open'); }
function closeModal(id) { $(id + '-modal').classList.remove('open'); }
document.querySelectorAll('[data-close]').forEach(el => el.addEventListener('click', () => closeModal(el.dataset.close)));

// Create
$('new-btn').addEventListener('click', () => {
  $('c-name').value = '';
  $('c-code').value = '';
  $('c-duration-value').value = '';
  $('c-duration-unit').value = 'days';
  $('c-limit').value = '3';
  $('c-notes').value = '';
  $('c-error').style.display = 'none';
  openModal('create');
  setTimeout(() => $('c-name').focus(), 100);
});
$('c-gen-btn').addEventListener('click', () => {
  const r1 = Math.random().toString(16).slice(2, 6).toUpperCase();
  const r2 = Math.random().toString(16).slice(2, 6).toUpperCase();
  $('c-code').value = `TC-${r1}-${r2}`;
});
$('c-save').addEventListener('click', async () => {
  const body = {
    code: $('c-code').value.trim() || null,
    customer_name: $('c-name').value.trim() || null,
    device_limit: parseInt($('c-limit').value) || 3,
    duration_unit: $('c-duration-unit').value,
    duration_value: parseInt($('c-duration-value').value) || null,
    notes: $('c-notes').value.trim() || null,
  };
  if (body.duration_unit !== 'forever' && (!body.duration_value || body.duration_value <= 0)) {
    $('c-error').textContent = 'Informe um valor de duração válido (ou escolha "Sem expiração").';
    $('c-error').style.display = 'block';
    return;
  }
  try {
    const res = await api('/admin/tokens', { method: 'POST', body });
    closeModal('create');
    // Mostra o resultado
    $('r-code').textContent = res.code;
    const lines = [];
    if (res.customer_name) lines.push(`Usuário: <strong style="color: var(--text)">${res.customer_name}</strong>`);
    if (res.expires_at) {
      const exp = new Date(res.expires_at);
      lines.push(`Expira em: <strong style="color: var(--gold)">${exp.toLocaleString('pt-BR')}</strong>`);
    } else {
      lines.push(`<strong style="color: var(--blue)">Sem expiração</strong>`);
    }
    $('r-info').innerHTML = lines.join('<br>');
    openModal('result');
    await refresh();
  } catch (e) {
    $('c-error').textContent = 'Erro: ' + e.message;
    $('c-error').style.display = 'block';
  }
});

$('r-copy').addEventListener('click', async () => {
  try { await navigator.clipboard.writeText($('r-code').textContent); showToast('Código copiado', 'success'); }
  catch { showToast('Falha ao copiar', 'error'); }
});
$('r-code').addEventListener('click', async () => {
  try { await navigator.clipboard.writeText($('r-code').textContent); showToast('Código copiado', 'success'); }
  catch {}
});

// Edit
let editingId = null;
function openEdit(t) {
  editingId = t._id;
  $('e-name').value = t.customer_name || '';
  $('e-limit').value = t.device_limit || 3;
  $('e-notes').value = t.notes || '';
  openModal('edit');
}
$('e-save').addEventListener('click', async () => {
  if (!editingId) return;
  const body = {
    customer_name: $('e-name').value.trim() || null,
    device_limit: parseInt($('e-limit').value) || 3,
    notes: $('e-notes').value.trim() || null,
  };
  try {
    await api('/admin/tokens/' + editingId, { method: 'PATCH', body });
    closeModal('edit');
    showToast('Token atualizado', 'success');
    await refresh();
  } catch (e) {
    showToast('Erro: ' + e.message, 'error');
  }
});

// Auto-refresh a cada 30s pra detectar mudanças (devices conectando, etc)
setInterval(() => {
  if (ADMIN_TOKEN && $('app-view').style.display !== 'none') {
    refresh().catch(() => {});
  }
}, 30000);
</script>
</body>
